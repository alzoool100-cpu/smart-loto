<style>

:root{--bg:#07101E;--s1:#0D1829;--s2:#122035;--s3:#1A2D47;--b:#1E3050;--accent:#00C9A7;--danger:#EF4444;--warn:#F59E0B;--muted:#64748B}

@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr)}.lay{grid-template-columns:1fr!important}.bhs{grid-template-columns:1fr!important}.inv3{grid-template-columns:1fr!important}}

.nb{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:none;background:var(--s3);color:var(--accent);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.alb{padding:8px;border-radius:7px;border:1px dashed var(--accent);background:none;color:var(--accent);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;text-align:center;margin-top:6px;width:100%}
.rlb{padding:7px;border-radius:7px;border:1px solid var(--danger);background:none;color:var(--danger);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;margin-top:4px;width:100%}

.bhs{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.bpan,.hpan{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:14px}
.bgrid{display:grid;grid-template-columns:18px repeat(8,1fr);gap:2px}

.bsl{aspect-ratio:1;border-radius:4px;border:1px solid var(--b);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;cursor:pointer;transition:all .15s}
.bsl.hk:hover{transform:scale(1.08);z-index:2}.bsl.hl{box-shadow:0 0 0 2px var(--accent);transform:scale(1.1);z-index:3}
.bno{font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:700;line-height:1}
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.hook{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:8px;border:1px solid var(--b);background:var(--bg);min-height:62px;transition:all .2s}
.hook.av{cursor:pointer}.hook.av:hover{border-color:var(--accent)}.hook.em{opacity:.3;border-style:dashed}
.hpeg{width:2px;height:10px;background:var(--muted);border-radius:2px;opacity:.6}
.inv3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ic{background:var(--s1);border:1px solid var(--b);border-radius:10px;padding:12px}
.ir{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--b)}.ir:last-child{border:none}
.twrap{background:var(--s1);border:1px solid var(--b);border-radius:12px;padding:14px}
.th2{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
table{width:100%;border-collapse:collapse;font-size:11px;overflow-x:auto;display:block}
th{background:var(--s3);padding:7px 10px;text-align:right;color:var(--muted);font-weight:700;border-bottom:1px solid var(--b);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--b);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
tr:last-child td{border:none}tr:hover td{background:var(--s2)}
.rt{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:5px;padding:3px 8px;font-size:10px;font-family:'Tajawal',sans-serif;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:18px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;direction:rtl}
.mt{font-size:15px;font-weight:900;margin-bottom:14px}
.fg{margin-bottom:10px}.fl{font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:7px;padding:8px 11px;color:#E2E8F0;font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none;direction:rtl;text-align:right}
.fi:focus,.fs:focus{border-color:var(--accent)}.fs option{background:var(--s1)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mac{display:flex;gap:8px;margin-top:14px}
.can{flex:1;background:none;border:1px solid var(--b);color:var(--muted);border-radius:8px;padding:8px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer}
.con{flex:2;background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.con:disabled{opacity:.35;cursor:not-allowed}
.ib{background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.2);border-radius:8px;padding:10px;font-size:12px;color:var(--accent);margin-bottom:12px;line-height:1.7}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1px solid;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;margin:3px;transition:all .2s}
.chip.pk{box-shadow:0 0 0 2px var(--accent)}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}
.ss{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.sn2{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#000;flex-shrink:0}
.exp{background:var(--s3);color:#E2E8F0;border:1px solid var(--b);border-radius:6px;padding:5px 12px;font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 24px;border-radius:20px;font-weight:800;font-size:13px;z-index:999;white-space:nowrap;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" charset="utf-8">
const { useState, useEffect, useCallback, Fragment } = React;
const { createClient } = supabase;

const SUPABASE_URL = "https://nbgmfvzrfylmhzwjwewl.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ21mdnpyZnlsbWh6d2p3ZXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTIyODMsImV4cCI6MjA5NDI2ODI4M30.Ir8-Ot9xib5wulL1uV2S8HKl1lTB1Ou8wlpuJe-tixg";

const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const LT = {
  operations:{label:"مشغل",color:"#22C55E",icon:"🟢",hex:"22C55E"},
  mechanical:{label:"ميكانيكي",color:"#3B82F6",icon:"🔵",hex:"3B82F6"},
  electrical:{label:"كهربائي",color:"#EF4444",icon:"🔴",hex:"EF4444"}
};
const RI = {
  supervisor:{label:"مشرف",icon:"⭐",color:"#F59E0B"},
  operations:{label:"مشغل",icon:"🟢",color:"#22C55E"},
  mechanical:{label:"ميكانيكا",icon:"🔵",color:"#3B82F6"},
  electrical:{label:"كهرباء",icon:"🔴",color:"#EF4444"}
};
const REASONS = ["صيانة روتينية","استبدال كابلنج","استبدال بيرينج","استبدال ختم / سيل","فحص ومعاينة","أعمال كهربائية","صيانة صمام","استبدال موتور","معدة ملغاة","أخرى"];
const BC=["A","B","C","D","E","F","G","H"],BR=[1,2,3,4,5,6,7,8];
const SLOTS=BC.flatMap(c=>BR.map(r=>`${c}${r}`));

function eqSt(id,locks){
  const al=locks.filter(l=>l.status==="applied"&&l.equipment_id===id);
  const op=al.some(l=>l.lock_type==="operations");
  const mn=al.some(l=>l.lock_type!=="operations");
  if(!op&&mn)return"violation";if(op&&mn)return"locked_safe";if(op)return"ops_only";return"clear";
}
const SI={
  violation:{label:"🚨 خطأ تسلسل",color:"#EF4444",bg:"rgba(239,68,68,.12)"},
  locked_safe:{label:"🔒 مغلق صحيح",color:"#22C55E",bg:"rgba(34,197,94,.1)"},
  ops_only:{label:"⏳ بانتظار صيانة",color:"#F59E0B",bg:"rgba(245,158,11,.1)"},
  clear:{label:"✅ متاحة",color:"#64748B",bg:"rgba(100,116,139,.07)"},
  decomm:{label:"⚠️ ملغاة",color:"#64748B",bg:"rgba(100,116,139,.07)"}
};

function App() {
  const [role,setRole]=useState("supervisor");
  const [tab,setTab]=useState("dashboard");
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [toast,setToast]=useState(null);
  const [eq,setEq]=useState([]);
  const [locks,setLocks]=useState([]);
  const [staff,setStaff]=useState([]);
  const [rooms,setRooms]=useState({});
  const [log,setLog]=useState([]);
  const [search,setSearch]=useState("");
  const [roomF,setRoomF]=useState("all");
  const [sel,setSel]=useState(null);
  const [hlSlot,setHlSlot]=useState(null);
  const [selRoom,setSelRoom]=useState(null);
  const [showApply,setShowApply]=useState(null);
  const [showAddEq,setShowAddEq]=useState(false);
  const [showAddLk,setShowAddLk]=useState(false);
  const [pickedLk,setPickedLk]=useState("");
  const [pickedSl,setPickedSl]=useState("");
  const [aForm,setAForm]=useState({appliedBy:"",idNo:"",reason:"صيانة روتينية",permit:""});
  const [eForm,setEForm]=useState({tag:"",name:"",mcc_room:"60K-A",rack:"SA.14",row_position:"",permit:""});
  const [lForm,setLForm]=useState({lock_no:"",lock_type:"operations"});

  function showT(m){setToast(m);setTimeout(()=>setToast(null),2800);}

  const load=useCallback(async()=>{
    try{
      setError(null);
      const [eRes,lRes,sRes,rRes,lgRes]=await Promise.all([
        db.from("equipment").select("*").order("tag"),
        db.from("locks").select("*,equipment:equipment_id(tag,name,mcc_room,rack,row_position)").order("lock_no"),
        db.from("personnel").select("*").eq("active",true).order("full_name"),
        db.from("mcc_rooms").select("*").order("code"),
        db.from("audit_log").select("*").order("action_at",{ascending:false}).limit(100),
      ]);
      if(eRes.error)throw eRes.error;
      if(lRes.error)throw lRes.error;
      setEq(eRes.data||[]);setLocks(lRes.data||[]);setStaff(sRes.data||[]);
      const rm={};(rRes.data||[]).forEach(x=>{rm[x.code]=x;});setRooms(rm);
      setLog(lgRes.data||[]);
    }catch(err){setError(err.message||"خطأ في الاتصال");}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load();},[]);
  useEffect(()=>{const t=setInterval(load,30000);return()=>clearInterval(t);},[]);

  const applied=locks.filter(l=>l.status==="applied");
  const avail=locks.filter(l=>l.status==="available");
  const eqLocks=id=>locks.filter(l=>l.status==="applied"&&l.equipment_id===id);
  const violations=eq.filter(e=>!e.decommissioned&&eqSt(e.id,locks)==="violation");
  const boxMap={};applied.forEach(l=>{if(l.box_slot)boxMap[l.box_slot]=l;});
  function nextSlot(){const u=new Set(applied.map(l=>l.box_slot).filter(Boolean));return SLOTS.find(s=>!u.has(s))||"";}
  const inv={
    operations:{t:locks.filter(l=>l.lock_type==="operations").length,a:applied.filter(l=>l.lock_type==="operations").length,v:avail.filter(l=>l.lock_type==="operations").length},
    mechanical:{t:locks.filter(l=>l.lock_type==="mechanical").length,a:applied.filter(l=>l.lock_type==="mechanical").length,v:avail.filter(l=>l.lock_type==="mechanical").length},
    electrical:{t:locks.filter(l=>l.lock_type==="electrical").length,a:applied.filter(l=>l.lock_type==="electrical").length,v:avail.filter(l=>l.lock_type==="electrical").length}
  };
  const vis=eq.filter(e=>{
    if(roomF!=="all"&&e.mcc_room!==roomF)return false;
    if(search.trim()){const q=search.trim().toUpperCase();return e.tag.toUpperCase().includes(q)||e.name.toUpperCase().includes(q)||eqLocks(e.id).some(l=>l.lock_no.toUpperCase().includes(q));}
    return true;
  });

  async function applyLock(eqId){
    const e=eq.find(x=>x.id===eqId);
    const {error:e1}=await db.from("locks").update({status:"applied",equipment_id:eqId,box_slot:pickedSl,applied_by:aForm.appliedBy,applied_id_no:aForm.idNo,reason:aForm.reason,permit:aForm.permit,applied_at:new Date().toISOString()}).eq("lock_no",pickedLk);
    if(e1){alert("خطأ: "+e1.message);return;}
    await db.from("audit_log").insert({action:"APPLIED",lock_no:pickedLk,lock_type:locks.find(l=>l.lock_no===pickedLk)?.lock_type,eq_tag:e?.tag,eq_name:e?.name,by_name:aForm.appliedBy,by_id_no:aForm.idNo,reason:aForm.reason,box_slot:pickedSl});
    await load();setShowApply(null);setPickedLk("");setPickedSl("");setAForm({appliedBy:"",idNo:"",reason:"صيانة روتينية",permit:""});
    showT("✅ تم تطبيق القفل "+pickedLk+" — المفتاح في خانة "+pickedSl);
  }

  async function removeLock(lockNo){
    const lk=locks.find(l=>l.lock_no===lockNo);
    const e=eq.find(x=>x.id===lk?.equipment_id);
    const {error:e1}=await db.from("locks").update({status:"available",equipment_id:null,box_slot:null,applied_by:null,applied_id_no:null,reason:null,permit:null,applied_at:null}).eq("lock_no",lockNo);
    if(e1){alert("خطأ: "+e1.message);return;}
    await db.from("audit_log").insert({action:"REMOVED",lock_no:lockNo,lock_type:lk?.lock_type,eq_tag:e?.tag,by_name:lk?.applied_by,reason:lk?.reason,box_slot:lk?.box_slot});
    await load();setHlSlot(null);setSel(null);showT("🔓 تم إزالة القفل "+lockNo);
  }

  async function addEq(){
    const {error:e1}=await db.from("equipment").insert(eForm);
    if(e1){alert("خطأ: "+e1.message);return;}
    await db.from("audit_log").insert({action:"ADDED_EQ",eq_tag:eForm.tag,eq_name:eForm.name});
    await load();setShowAddEq(false);setEForm({tag:"",name:"",mcc_room:"60K-A",rack:"SA.14",row_position:"",permit:""});showT("✅ تمت إضافة المعدة");
  }

                      <tr key={e.id}>
                        <td style={{color:"#fff",fontWeight:700}}>{e.tag}</td>
                        <td style={{fontFamily:"Tajawal,sans-serif",fontSize:12}}>{e.name}</td>
                        <td style={{color:"var(--accent)"}}>{e.rack}</td>
                        <td>{e.row_position}</td>
                        <td>{eqLocks(e.id).map(l=>(LT[l.lock_type]?.icon||"")+l.lock_no+"(📦"+l.box_slot+")").join(" ")||"—"}</td>
                        <td style={{color:SI[st].color,fontWeight:700}}>{SI[st].label}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {tab==="reports"&&(
        <div className="main">
          {!isSup&&<div className="empty" style={{padding:40}}>⭐ التقارير للمشرف فقط</div>}
          {isSup&&(
            <Fragment>
              <div className="twrap">
                <div className="th2"><div className="stitle" style={{margin:0}}>🔴 الأقفال المطبقة الآن</div><button className="exp" onClick={exportCSV}>⬇ تصدير CSV</button></div>
                <table>
                  <thead><tr><th>📦</th><th>القفل</th><th>المعدة</th><th>الموقع</th><th>السبب</th><th>المنفذ</th><th>التاريخ</th></tr></thead>
                  <tbody>
                    {applied.map(l=>{const lt=LT[l.lock_type];return(
                      <tr key={l.lock_no}>
                        <td style={{color:"var(--warn)",fontWeight:700}}>{l.box_slot}</td>
                        <td style={{color:lt.color,fontWeight:700}}>{lt.icon} {l.lock_no}</td>
                        <td style={{color:"#fff"}}>{l.equipment?.tag}</td>
                        <td style={{fontSize:10}}>{l.equipment?.mcc_room} {l.equipment?.rack} {l.equipment?.row_position}</td>
                        <td style={{fontFamily:"Tajawal,sans-serif",fontSize:11}}>{l.reason}</td>
                        <td style={{fontFamily:"Tajawal,sans-serif",fontSize:11}}>{l.applied_by}</td>
                        <td>{l.applied_at?.slice(0,10)}</td>
                      </tr>
                    );})}
                    {applied.length===0&&<tr><td colSpan={7} style={{textAlign:"center",padding:20,color:"var(--muted)"}}>✅ لا توجد أقفال مطبقة الآن</td></tr>}
                  </tbody>
                </table>
              </div>
              <div className="twrap">
                <div className="th2"><div className="stitle" style={{margin:0}}>📜 سجل الأوديت</div></div>
                {log.length===0&&<div className="empty">لا توجد أحداث بعد</div>}
                <table>
                  <thead><tr><th>الإجراء</th><th>القفل</th><th>المعدة</th><th>السبب</th><th>المنفذ</th><th>📦</th><th>الوقت</th></tr></thead>
                  <tbody>
                    {log.map(h=>(
                      <tr key={h.id}>
                        <td style={{color:h.action==="APPLIED"?"var(--danger)":"var(--accent)",fontWeight:700}}>{h.action==="APPLIED"?"🔒 إغلاق":h.action==="REMOVED"?"🔓 فتح":h.action==="ADDED_EQ"?"🏭 معدة":"🔑 قفل"}</td>
                        <td style={{color:LT[h.lock_type]?.color||"var(--muted)",fontWeight:700}}>{h.lock_no||"—"}</td>
                        <td style={{color:"#fff"}}>{h.eq_tag||"—"}</td>
                        <td style={{fontFamily:"Tajawal,sans-serif",fontSize:11}}>{h.reason||"—"}</td>
                        <td style={{fontFamily:"Tajawal,sans-serif",fontSize:11}}>{h.by_name||"—"}</td>
                        <td style={{color:"var(--warn)"}}>{h.box_slot||"—"}</td>
                        <td style={{fontSize:10}}>{h.action_at?.slice(0,16).replace("T"," ")}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Fragment>
          )}
        </div>
      )}

      {/* APPLY MODAL */}
      {showApply&&(()=>{
        const e=eq.find(x=>x.id===showApply);
        return(
          <div className="overlay" onClick={ev=>{if(ev.target===ev.currentTarget)setShowApply(null);}}>
            <div className="modal">
              <div className="mt">🔒 تطبيق قفل</div>
              <div className="ib">📍 <strong>{e?.tag}</strong> — {e?.mcc_room} ← {e?.rack} ← صف {e?.row_position}<br/>خذ القفل من الخطاف ← ضعه على البريكر ← ضع المفتاح في الصندوق</div>
              <div className="fg">
                <label className="fl">اختر القفل من الخطاطيف</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {avail.map(l=>{const lt=LT[l.lock_type];return(
                    <span key={l.lock_no} className={"chip"+(pickedLk===l.lock_no?" pk":"")} style={{color:lt.color,borderColor:lt.color+(pickedLk===l.lock_no?"":"44"),background:lt.color+(pickedLk===l.lock_no?"22":"0D")}} onClick={()=>setPickedLk(l.lock_no)}>{lt.icon} {l.lock_no}</span>
                  );})}
                  {avail.length===0&&<div style={{color:"var(--danger)",fontSize:12,padding:8}}>⚠️ لا توجد أقفال متاحة — أضف أقفالاً بالضغط على "+ قفل"</div>}
                </div>
              </div>
              <div className="fg">
                <label className="fl">خانة الصندوق للمفتاح</label>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input className="fi" style={{flex:1}} placeholder="A3" value={pickedSl} onChange={ev=>setPickedSl(ev.target.value.toUpperCase())}/>
                  <span style={{fontSize:11,color:"var(--accent)"}}>مقترح: {nextSlot()}</span>
                </div>
              </div>
              <div className="fg">
                <label className="fl">الاسم</label>
                <select className="fs" value={aForm.appliedBy} onChange={ev=>setAForm(p=>({...p,appliedBy:ev.target.value}))}>
                  <option value="">اختر الموظف...</option>
                  {staff.map(p=><option key={p.id} value={p.full_name}>{p.full_name} — {p.id_no}</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="fl">سبب الإغلاق</label>
                <select className="fs" value={aForm.reason} onChange={ev=>setAForm(p=>({...p,reason:ev.target.value}))}>
                  {REASONS.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div className="fg"><label className="fl">رقم التصريح</label><input className="fi" placeholder="WP-2025-" value={aForm.permit} onChange={ev=>setAForm(p=>({...p,permit:ev.target.value}))}/></div>
              <div className="mac">
                <button className="can" onClick={()=>setShowApply(null)}>إلغاء</button>
                <button className="con" disabled={!pickedLk||!pickedSl||!aForm.appliedBy} onClick={()=>applyLock(showApply)}>🔒 تطبيق {pickedLk} → 📦 {pickedSl}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ADD EQ */}
      {showAddEq&&(
        <div className="overlay" onClick={ev=>{if(ev.target===ev.currentTarget)setShowAddEq(false);}}>
          <div className="modal">
            <div className="mt">🏭 إضافة معدة جديدة</div>
            <div className="two">
              <div className="fg"><label className="fl">رقم المعدة (Tag)</label><input className="fi" placeholder="12-P-9113-M" value={eForm.tag} onChange={ev=>setEForm(p=>({...p,tag:ev.target.value}))}/></div>
              <div className="fg"><label className="fl">رقم التصريح</label><input className="fi" placeholder="WP-2025-" value={eForm.permit} onChange={ev=>setEForm(p=>({...p,permit:ev.target.value}))}/></div>
            </div>
            <div className="fg"><label className="fl">اسم المعدة</label><input className="fi" placeholder="Jacket Circulation Pump..." value={eForm.name} onChange={ev=>setEForm(p=>({...p,name:ev.target.value}))}/></div>
            <div className="two">
              <div className="fg">
                <label className="fl">غرفة MCC</label>
                <select className="fs" value={eForm.mcc_room} onChange={ev=>setEForm(p=>({...p,mcc_room:ev.target.value,rack:rooms[ev.target.value]?.racks?.[0]||""}))}>
                  {Object.keys(rooms).map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="fl">الراك</label>
                <select className="fs" value={eForm.rack} onChange={ev=>setEForm(p=>({...p,rack:ev.target.value}))}>
                  {(rooms[eForm.mcc_room]?.racks||[]).map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
            </div>
            <div className="fg"><label className="fl">الصف (مثل G4)</label><input className="fi" placeholder="G4" value={eForm.row_position} onChange={ev=>setEForm(p=>({...p,row_position:ev.target.value}))}/></div>
            <div className="mac">
              <button className="can" onClick={()=>setShowAddEq(false)}>إلغاء</button>
              <button className="con" disabled={!eForm.tag||!eForm.name} onClick={addEq}>✅ إضافة المعدة</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD LOCK */}
      {showAddLk&&(
        <div className="overlay" onClick={ev=>{if(ev.target===ev.currentTarget)setShowAddLk(false);}}>
          <div className="modal">
            <div className="mt">🔑 إضافة قفل للنظام</div>
            <div className="ib">القفل الجديد سيظهر على الخطاطيف كـ "متاح" ✅</div>
            <div className="two">
              <div className="fg"><label className="fl">رقم القفل</label><input className="fi" placeholder="M101" value={lForm.lock_no} onChange={ev=>setLForm(p=>({...p,lock_no:ev.target.value.toUpperCase()}))}/></div>
              <div className="fg">
                <label className="fl">النوع</label>
                <select className="fs" value={lForm.lock_type} onChange={ev=>setLForm(p=>({...p,lock_type:ev.target.value}))}>
                  <option value="operations">🟢 مشغل</option>
                  <option value="mechanical">🔵 ميكانيكي</option>
                  <option value="electrical">🔴 كهربائي</option>
                </select>
              </div>
            </div>
            <div className="mac">
              <button className="can" onClick={()=>setShowAddLk(false)}>إلغاء</button>
              <button className="con" disabled={!lForm.lock_no} onClick={addLk}>✅ إضافة للخطاطيف</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
