// ── SHA-256 ──────────────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── TOAST SYSTEM ─────────────────────────────────────────────────────────────
let _setToasts = null;
function toast(msg, type = 'ok') {
  if (_setToasts) _setToasts(ts => [...ts, { id: Date.now() + Math.random(), msg, type }]);
}

function Toasts() {
  const [toasts, setToasts] = useState([]);
  _setToasts = setToasts;
  useEffect(() => {
    if (!toasts.length) return;
    const t = setTimeout(() => setToasts(ts => ts.slice(1)), 3000);
    return () => clearTimeout(t);
  }, [toasts]);
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function lockColor(type) {
  if (type === 'operations') return '#22c55e';
  if (type === 'mechanical') return '#3b82f6';
  if (type === 'electrical') return '#ef4444';
  return '#94a3b8';
}
function lockBadgeClass(type) {
  if (type === 'operations') return 'badge-green';
  if (type === 'mechanical') return 'badge-blue';
  if (type === 'electrical') return 'badge-red';
  return 'badge-gray';
}
function roleLockType(role) {
  if (role === 'operations') return 'operations';
  if (role === 'mechanical') return 'mechanical';
  if (role === 'electrical') return 'electrical';
  return null;
}

// ── PRINT DANGER TAG ─────────────────────────────────────────────────────────

  const el = document.getElementById('danger-tag');

// ── MODAL ─────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">

          <button className="close-btn" onClick={onClose}>×</button>

        {footer && <div className="modal-footer">{footer}</div>}
      </div>

}

// ── AUTOCOMPLETE LOCK PICKER ──────────────────────────────────────────────────
function LockPicker({ lockType, onSelect, selected }) {
  const [query, setQuery] = useState('');
  const [locks, setLocks] = useState([]);
  const [open, setOpen] = useState(false);
  const ref = useRef();

  useEffect(() => {
    db.from('locks').select('*').eq('lock_type', lockType).eq('status', 'available').order('lock_no')
      .then(({ data }) => setLocks(data || []));
  }, [lockType]);

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const display = selected ? selected.lock_no : query;
  const filtered = locks.filter(l => l.lock_no.toLowerCase().includes(query.toLowerCase()));

  return (
    <div className="ac-wrap" ref={ref}>
      <input type="text" style={{ width: '100%' }}
        placeholder={`Search ${lockType} lock...`}
        value={display}
        onChange={e => { setQuery(e.target.value); setOpen(true); if (selected) onSelect(null); }}
        onFocus={() => setOpen(true)}
      />
      {open && (
        <div className="ac-list">
          {filtered.length === 0
            ? <div className="ac-item" style={{ color: 'var(--muted)' }}>No available locks</div>
            : filtered.map(l => (
              <div key={l.id} className="ac-item" onMouseDown={() => { onSelect(l); setQuery(''); setOpen(false); }}>
                <span style={{ color: lockColor(l.lock_type), fontWeight: 700 }}>{l.lock_no}</span>
                {l.box_slot && <span style={{ color: 'var(--muted)', marginLeft: 8, fontSize: 11 }}>Slot {l.box_slot}</span>}
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ── APPLY LOCK MODAL ──────────────────────────────────────────────────────────
function ApplyLockModal({ equipment: eq, session, lockType, onClose, onApplied }) {

  const handleApply = async () => {

    // One lock per type per equipment
    const { data: existing } = await db.from('locks').select('id')
      .eq('equipment_id', eq.id).eq('lock_type', lockType).eq('status', 'applied');
    if (existing && existing.length > 0) {
      setErr(`This equipment already has a ${lockType} lock applied.`);
      setLoading(false); return;
    }
    // Mechanical/electrical require ops lock
    if (lockType !== 'operations') {
      const { data: opsLocks } = await db.from('locks').select('id')
        .eq('equipment_id', eq.id).eq('lock_type', 'operations').eq('status', 'applied');
      if (!opsLocks || opsLocks.length === 0) {
        setErr('Cannot apply: No operations lock on this equipment. Operations must lock out first.');
        setLoading(false); return;
      }
    }
    const finalReason = reason === 'Other' ? (otherReason || 'Other') : reason;
    const now = new Date().toISOString();
    const { error } = await db.from('locks').update({
      status: 'applied', equipment_id: eq.id,
      applied_by: session.full_name, applied_id_no: session.id_no,
      reason: finalReason, permit, applied_at: now
    }).eq('id', lock.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    await db.from('audit_log').insert({
      action: 'APPLIED', lock_no: lock.lock_no, lock_type: lockType,
      eq_tag: eq.tag, eq_name: eq.name,
      by_name: session.full_name, by_id_no: session.id_no,
      reason: finalReason, box_slot: lock.box_slot, action_at: now
    });
    toast(`Lock ${lock.lock_no} applied to ${eq.tag}`);
    onApplied({ lock_no: lock.lock_no, eq_tag: eq.tag, id_no: session.id_no, full_name: session.full_name, company: session.company, permit });
    setLoading(false);
  };

  return (
    <Modal title={`Apply ${lockType} Lock — ${eq.tag}`} onClose={onClose}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn btn-accent" onClick={handleApply} disabled={loading}>{loading ? 'Applying...' : 'Apply Lock'}</button>
      </>}>
      {err && <div className="alert alert-danger">{err}</div>}
      <div className="form-group">
        <label className="form-label">Select {lockType} lock</label>
        <LockPicker lockType={lockType} onSelect={setLock} selected={lock} />
      </div>
      <div className="form-group">
        <label className="form-label">Reason</label>
        <select value={reason} onChange={e => setReason(e.target.value)} style={{ width: '100%' }}>
          {REASONS.map(r => <option key={r}>{r}</option>)}
        </select>
      </div>
      {reason === 'Other' && (
        <div className="form-group">
          <label className="form-label">Specify reason</label>
          <input type="text" value={otherReason} onChange={e => setOtherReason(e.target.value)} style={{ width: '100%' }} />
        </div>
      )}
      <div className="form-group">
        <label className="form-label">Work Permit No. (optional)</label>
        <input type="text" value={permit} onChange={e => setPermit(e.target.value)} style={{ width: '100%' }} placeholder="e.g. WP-2024-001" />
      </div>
    </Modal>
  );
}

// ── REMOVE LOCK MODAL ─────────────────────────────────────────────────────────
function RemoveLockModal({ lock, equipment: eq, session, onClose, onRemoved }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleRemove = async () => {
    setLoading(true);
    if (lock.lock_type === 'operations') {
      const { data: others } = await db.from('locks').select('id')
        .eq('equipment_id', eq.id).in('lock_type', ['mechanical', 'electrical']).eq('status', 'applied');
      if (others && others.length > 0) {
        setErr('Cannot remove operations lock: mechanical or electrical locks are still applied.');
        setLoading(false); return;
      }
    }
    const { error } = await db.from('locks').update({
      status: 'available', equipment_id: null, applied_by: null,
      applied_id_no: null, reason: null, permit: null, applied_at: null
    }).eq('id', lock.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    await db.from('audit_log').insert({
      action: 'REMOVED', lock_no: lock.lock_no, lock_type: lock.lock_type,
      eq_tag: eq.tag, eq_name: eq.name,
      by_name: session.full_name, by_id_no: session.id_no,
      reason: lock.reason, box_slot: lock.box_slot,
      action_at: new Date().toISOString()
    });
    toast(`Lock ${lock.lock_no} removed from ${eq.tag}`);
    onRemoved();
  };

  return (
    <Modal title={`Remove ${lock.lock_type} Lock`} onClose={onClose}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn btn-danger" onClick={handleRemove} disabled={loading}>{loading ? 'Removing...' : 'Remove Lock'}</button>
      </>}>
      {err && <div className="alert alert-danger">{err}</div>}
      <p style={{ fontSize: 13, marginBottom: 12 }}>
        Remove lock <strong style={{ color: lockColor(lock.lock_type) }}>{lock.lock_no}</strong> from <strong>{eq.tag} — {eq.name}</strong>?
      </p>
      <div className="detail-panel" style={{ fontSize: 12 }}>
        <div className="detail-row"><span className="detail-label">Applied By</span><span>{lock.applied_by}</span></div>
        <div className="detail-row"><span className="detail-label">Reason</span><span>{lock.reason}</span></div>
        <div className="detail-row"><span className="detail-label">Work Permit</span><span>{lock.permit || '—'}</span></div>
      </div>
    </Modal>
  );
}

// ── EQUIPMENT CARD ────────────────────────────────────────────────────────────
function EquipmentCard({ eq, locks, session, onAction }) {
  const role = session.role;

  const elecLocks = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'electrical'  && l.status === 'applied');

  const hasMyLock = myLocks.length > 0;

  return (
    <div className="eq-card">
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>

      </div>

        {opsLocks.length > 0 && <span className="badge badge-green">OPS: {opsLocks[0].lock_no}</span>}
        {mechLocks.length > 0 && role !== 'operations' && role !== 'electrical' && <span className="badge badge-blue">MECH: {mechLocks[0].lock_no}</span>}
        {elecLocks.length > 0 && role !== 'operations' && role !== 'mechanical' && <span className="badge badge-red">ELEC: {elecLocks[0].lock_no}</span>}
        {opsLocks.length === 0 && mechLocks.length === 0 && elecLocks.length === 0 && <span className="badge badge-gray">No Locks</span>}
      </div>
      {myLockType && !eq.decommissioned && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {!hasMyLock && (
            <button className="btn btn-sm btn-accent" onClick={() => onAction('apply', eq)}>
              Apply {myLockType} Lock

            <button className="btn btn-sm btn-danger" onClick={() => onAction('remove', eq, myLocks[0])}>
              Remove My Lock ({myLocks[0].lock_no})

            <button className="tag-print-btn btn-sm" onClick={() => printDangerTag({ eq_tag: eq.tag, lock_no: myLocks[0].lock_no, id_no: session.id_no, full_name: session.full_name, company: session.company, permit: myLocks[0].permit })}>
              🖨 Print Tag
            </button>
          </>}
        </div>
      )}
    </div>
  );
}

function SmartListTab({ session, equipment, locks, onRefresh }) {

  const [removeModal, setRemoveModal] = useState(null);

  const smartList = equipment.filter(eq => {
    const hasOps = locks.some(l => l.equipment_id === eq.id && l.lock_type === 'operations' && l.status === 'applied');

  }).sort((a, b) => {
    const aOps = locks.find(l => l.equipment_id === a.id && l.lock_type === 'operations' && l.status === 'applied');

  const myApplied = locks.filter(l => l.lock_type === myLockType && l.status === 'applied' && l.applied_id_no === session.id_no);

              <div key={eq.id} className="eq-card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 8 }}>

                    <div className="eq-tag">{eq.tag}</div>
                    <div className="eq-name">{eq.name}</div>

            const eq = equipment.find(e => e.id === l.equipment_id);

            <span style={{ color: 'var(--muted)' }}>🔍</span>
            <input type="text" placeholder="Search equipment..." value={q} onChange={e => setQ(e.target.value)} />

          <select value={roomFilter} onChange={e => setRoomFilter(e.target.value)}>
            {rooms.map(r => <option key={r} value={r}>{r === 'all' ? 'All Rooms' : r}</option>)}
          </select>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 10 }}>
          {filtered.map(eq => {
            const opsL  = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'operations'  && l.status === 'applied');
            const mechL = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'mechanical'  && l.status === 'applied');
            const elecL = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'electrical'  && l.status === 'applied');
            return (
              <div key={eq.id} className="eq-card">
                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>

                    <div className="eq-name">{eq.name}</div>

              </div>
            );

          {filtered.length === 0 && <div className="empty" style={{ gridColumn: '1/-1' }}>No equipment found.</div>}
        </div>
      </div>
    </div>
  );

  const [form, setForm] = useState({ tag:'', name:'', mcc_room:'60K-A', rack:'', row_position:'', plant:'60K', breaker_no:'', permit:'', notes:'' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const filtered = equipment.filter(e => !q || e.tag.toLowerCase().includes(q.toLowerCase()) || e.name.toLowerCase().includes(q.toLowerCase()));

  const openAdd = () => { setForm({ tag:'', name:'', mcc_room:'60K-A', rack:'', row_position:'', plant:'60K', breaker_no:'', permit:'', notes:'' }); setEditEq(null); setErr(''); setShowModal(true); };
  const openEdit = eq => { setForm({ tag:eq.tag, name:eq.name, mcc_room:eq.mcc_room||'', rack:eq.rack||'', row_position:eq.row_position||'', plant:eq.plant||'', breaker_no:eq.breaker_no||'', permit:eq.permit||'', notes:eq.notes||'' }); setEditEq(eq); setErr(''); setShowModal(true); };

  const handleSave = async () => {
    if (!form.tag || !form.name) { setErr('Tag and name required.'); return; }
    setLoading(true);
    if (editEq) {
      const { error } = await db.from('equipment').update({ ...form }).eq('id', editEq.id);
      if (error) { setErr(error.message); setLoading(false); return; }
      toast('Equipment updated');
    } else {
      const { error } = await db.from('equipment').insert({ ...form, decommissioned: false });
      if (error) { setErr(error.message); setLoading(false); return; }
      toast('Equipment added');
    }
    setShowModal(false); onRefresh(); setLoading(false);
  };

  const toggleDecommission = async eq => {
    await db.from('equipment').update({ decommissioned: !eq.decommissioned }).eq('id', eq.id);
    toast(eq.decommissioned ? 'Equipment reactivated' : 'Equipment decommissioned');
    onRefresh();
  };

  const setMccRoom = val => setForm(f => ({ ...f, mcc_room: val, plant: MCC_ROOMS[val]?.plant || f.plant }));

  return (
    <div className="main">
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{ margin: 0 }}>Equipment ({equipment.length})</div>
          <button className="btn btn-accent" onClick={openAdd}>+ Add Equipment</button>
        </div>
        <div className="search-row" style={{ marginBottom: 12 }}>
          <div className="search-box" style={{ flex: 1 }}>
            <span style={{ color: 'var(--muted)' }}>🔍</span>
            <input type="text" placeholder="Search equipment..." value={q} onChange={e => setQ(e.target.value)} />
          </div>
        </div>
        <div className="ovr-x">
          <table>
            <thead><tr><th>Tag</th><th>Name</th><th>Plant</th><th>MCC Room</th><th>Rack</th><th>Row</th><th>Breaker</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.map(eq => (
                <tr key={eq.id}>
                  <td><span className="eq-tag">{eq.tag}</span></td>
                  <td>{eq.name}</td>
                  <td>{eq.plant}</td>
                  <td>{eq.mcc_room}</td>
                  <td>{eq.rack}</td>
                  <td>{eq.row_position}</td>
                  <td>{eq.breaker_no || '—'}</td>
                  <td>{eq.decommissioned ? <span className="badge badge-gray">Decomm.</span> : <span className="badge badge-green">Active</span>}</td>
                  <td>
                    <div style={{ display: 'flex', gap: 5 }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => openEdit(eq)}>Edit</button>
                      <button className="btn btn-sm" style={{ background: eq.decommissioned ? 'var(--accent)' : 'var(--warn)', color: '#000' }} onClick={() => toggleDecommission(eq)}>
                        {eq.decommissioned ? 'Reactivate' : 'Decomm.'}
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
              {filtered.length === 0 && <tr><td colSpan={9} className="empty">No equipment found.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {showModal && (
        <Modal title={editEq ? 'Edit Equipment' : 'Add Equipment'} onClose={() => setShowModal(false)}
          footer={<>
            <button className="btn btn-ghost" onClick={() => setShowModal(false)}>Cancel</button>
            <button className="btn btn-accent" onClick={handleSave} disabled={loading}>{loading ? 'Saving...' : 'Save'}</button>
          </>}>
          {err && <div className="alert alert-danger">{err}</div>}
          <div className="form-row">
            <div className="form-group"><label className="form-label">Tag *</label><input type="text" value={form.tag} onChange={e => setForm(f => ({ ...f, tag: e.target.value }))} style={{ width: '100%' }} /></div>
            <div className="form-group"><label className="form-label">Name *</label><input type="text" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} style={{ width: '100%' }} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">MCC Room</label>
              <select value={form.mcc_room} onChange={e => setMccRoom(e.target.value)} style={{ width: '100%' }}>
                {Object.keys(MCC_ROOMS).map(r => <option key={r}>{r}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Plant</label><input type="text" value={form.plant} onChange={e => setForm(f => ({ ...f, plant: e.target.value }))} style={{ width: '100%' }} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Rack</label><input type="text" value={form.rack} onChange={e => setForm(f => ({ ...f, rack: e.target.value }))} style={{ width: '100%' }} placeholder="e.g. SA.14" /></div>
            <div className="form-group"><label className="form-label">Row Position</label><input type="text" value={form.row_position} onChange={e => setForm(f => ({ ...f, row_position: e.target.value }))} style={{ width: '100%' }} placeholder="e.g. G4" /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Breaker No</label><input type="text" value={form.breaker_no} onChange={e => setForm(f => ({ ...f, breaker_no: e.target.value }))} style={{ width: '100%' }} placeholder="e.g. CB-03" /></div>
            <div className="form-group"><label className="form-label">Work Permit</label><input type="text" value={form.permit} onChange={e => setForm(f => ({ ...f, permit: e.target.value }))} style={{ width: '100%' }} /></div>
          </div>
          <div className="form-group"><label className="form-label">Notes</label><textarea value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} style={{ width: '100%', minHeight: 60 }} /></div>
        </Modal>
      )}
    </div>
  );
}

// ── SUPERVISOR: LOCKS TAB ─────────────────────────────────────────────────────
function SuperLocks({ locks, equipment, onRefresh }) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ lock_no: '', lock_type: 'operations', box_slot: '' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [filterType, setFilterType] = useState('all');

  const BOX_SLOTS = [];
  for (let r = 1; r <= 8; r++) for (const c of ['A','B','C','D','E','F','G','H']) BOX_SLOTS.push(`${c}${r}`);

  const handleAdd = async () => {
    if (!form.lock_no) { setErr('Lock number required.'); return; }
    setLoading(true);
    const { error } = await db.from('locks').insert({ lock_no: form.lock_no, lock_type: form.lock_type, status: 'available', box_slot: form.box_slot || null });
    if (error) { setErr(error.message); setLoading(false); return; }
    toast('Lock added'); setShowAdd(false); onRefresh(); setLoading(false);
  };

  const filteredLocks = filterType === 'all' ? locks : locks.filter(l => l.lock_type === filterType);
  const appliedLocks = filteredLocks.filter(l => l.status === 'applied');

  return (
    <div className="main">
      <div className="card">
        <div className="section-header"><div className="card-title" style={{ margin: 0 }}>Box Slot Visualization (8×8)</div></div>
        <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 8 }}>Columns A–H, Rows 1–8 | 🔒 = applied, color = lock type</div>
        <div className="box-grid">
          {BOX_SLOTS.map(slot => {
            const applied = locks.find(l => l.box_slot === slot && l.status === 'applied');
            const avail   = locks.find(l => l.box_slot === slot && l.status === 'available');
            const color   = applied ? lockColor(applied.lock_type) : avail ? lockColor(avail.lock_type) : null;
            return (
              <div key={slot} className="box-slot"
                style={{ borderColor: color || 'var(--b)', background: applied ? `${color}22` : avail ? `${color}11` : 'var(--s2)', borderWidth: applied ? 2 : 1 }}>
                <div className="box-slot-label">{slot}</div>
                {applied && <span style={{ fontSize: 8, fontWeight: 800, color, marginTop: 10 }}>{applied.lock_no}</span>}
                {applied && <span style={{ fontSize: 7 }}>🔒</span>}
                {!applied && avail && <span style={{ fontSize: 8, color, opacity: .6, marginTop: 10 }}>{avail.lock_no}</span>}
              </div>
            );
          })}
        </div>
      </div>
      <div className="card">
        <div className="section-header"><div className="card-title" style={{ margin: 0 }}>Hooks Board</div></div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
          {['all','operations','mechanical','electrical'].map(t => (
            <button key={t} className={`btn btn-sm ${filterType === t ? 'btn-accent' : 'btn-ghost'}`} onClick={() => setFilterType(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </button>
          ))}
        </div>
        <div className="hooks-board">
          {filteredLocks.map(l => (
            <div key={l.id} className={`hook ${l.lock_type === 'operations' ? 'ops' : l.lock_type === 'mechanical' ? 'mech' : 'elec'}`}
              style={{ opacity: l.status === 'available' ? .5 : 1 }}>
              <span style={{ fontSize: 8 }}>{l.status === 'applied' ? '🔒' : '🔓'}</span>
              <span style={{ fontSize: 9 }}>{l.lock_no}</span>
              {l.box_slot && <span style={{ fontSize: 7, opacity: .7 }}>{l.box_slot}</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{ margin: 0 }}>Applied Locks ({appliedLocks.length})</div>
          <button className="btn btn-accent" onClick={() => { setShowAdd(true); setErr(''); }}>+ Add Lock</button>
        </div>
        <div className="ovr-x">
          <table>
            <thead><tr><th>Lock No</th><th>Type</th><th>Equipment</th><th>Applied By</th><th>Reason</th><th>Permit</th><th>Box Slot</th><th>Applied At</th></tr></thead>
            <tbody>
              {appliedLocks.map(l => {
                const eq = equipment.find(e => e.id === l.equipment_id);
                return (
                  <tr key={l.id}>
                    <td><span style={{ color: lockColor(l.lock_type), fontWeight: 700, fontFamily: 'monospace' }}>{l.lock_no}</span></td>
                    <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_type}</span></td>
                    <td>{eq ? `${eq.tag} — ${eq.name}` : '—'}</td>
                    <td>{l.applied_by}<br /><span style={{ fontSize: 10, color: 'var(--muted)' }}>{l.applied_id_no}</span></td>
                    <td>{l.reason || '—'}</td>
                    <td>{l.permit || '—'}</td>
                    <td>{l.box_slot || '—'}</td>
                    <td style={{ fontSize: 11 }}>{l.applied_at ? new Date(l.applied_at).toLocaleString() : ''}</td>
                  </tr>
                );
              })}
              {appliedLocks.length === 0 && <tr><td colSpan={8} className="empty">No locks applied.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
      {showAdd && (
        <Modal title="Add Lock" onClose={() => setShowAdd(false)}
          footer={<>
            <button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-accent" onClick={handleAdd} disabled={loading}>{loading ? 'Adding...' : 'Add Lock'}</button>
          </>}>
          {err && <div className="alert alert-danger">{err}</div>}
          <div className="form-group"><label className="form-label">Lock Number</label><input type="text" value={form.lock_no} onChange={e => setForm(f => ({ ...f, lock_no: e.target.value }))} style={{ width: '100%' }} placeholder="e.g. M044" /></div>
          <div className="form-group"><label className="form-label">Lock Type</label>
            <select value={form.lock_type} onChange={e => setForm(f => ({ ...f, lock_type: e.target.value }))} style={{ width: '100%' }}>
              <option value="operations">Operations</option>
              <option value="mechanical">Mechanical</option>
              <option value="electrical">Electrical</option>
            </select>
          </div>
          <div className="form-group"><label className="form-label">Box Slot (e.g. A1)</label><input type="text" value={form.box_slot} onChange={e => setForm(f => ({ ...f, box_slot: e.target.value.toUpperCase() }))} style={{ width: '100%' }} placeholder="e.g. A1" /></div>
        </Modal>
      )}
    </div>
  );
}

// ── SUPERVISOR: MCC ROOMS TAB ─────────────────────────────────────────────────
function SuperMCCRooms({ equipment, locks }) {
  return (
    <div className="main">
      <div className="mcc-grid">
        {Object.entries(MCC_ROOMS).map(([code, room]) => {
          const roomEq = equipment.filter(e => e.mcc_room === code);
          const locked = roomEq.filter(e => locks.some(l => l.equipment_id === e.id && l.status === 'applied'));
          return (
            <div key={code} className="mcc-card">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <div style={{ width: 10, height: 10, borderRadius: '50%', background: room.color, flexShrink: 0 }} />
                <div style={{ fontWeight: 800, fontSize: 15 }}>{code}</div>
                <span className="badge badge-gray" style={{ marginLeft: 'auto' }}>{room.plant}</span>
              </div>
              <div style={{ display: 'flex', gap: 14, marginBottom: 10, fontSize: 12 }}>
                <span><strong style={{ color: 'var(--accent)' }}>{roomEq.length}</strong> <span style={{ color: 'var(--muted)' }}>Equipment</span></span>
                <span><strong style={{ color: '#ef4444' }}>{locked.length}</strong> <span style={{ color: 'var(--muted)' }}>Locked</span></span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 700, marginBottom: 6 }}>RACKS</div>
              {room.racks.map(rack => {
                const rackEq = roomEq.filter(e => e.rack === rack);
                return (
                  <div key={rack} className="rack-item">
                    <span style={{ fontFamily: 'monospace', color: room.color, fontWeight: 700, minWidth: 60 }}>{rack}</span>
                    <span style={{ color: 'var(--muted)' }}>{rackEq.length} equipment</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SUPERVISOR: REPORTS TAB ───────────────────────────────────────────────────
function SuperReports({ session }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ dateFrom: '', dateTo: '', person: '', tag: '', status: 'all', lockType: 'all' });
  const [reportType, setReportType] = useState('internal');

  const fetchLogs = useCallback(async () => {
    setLoading(true);
    let q = db.from('audit_log').select('*').order('action_at', { ascending: false });
    if (filters.dateFrom) q = q.gte('action_at', filters.dateFrom + 'T00:00:00');
    if (filters.dateTo)   q = q.lte('action_at', filters.dateTo   + 'T23:59:59');
    if (filters.person)   q = q.ilike('by_name', `%${filters.person}%`);
    if (filters.tag)      q = q.ilike('eq_tag',  `%${filters.tag}%`);
    if (filters.lockType !== 'all') q = q.eq('lock_type', filters.lockType);
    if (filters.status === 'active')    q = q.eq('action', 'APPLIED');
    if (filters.status === 'completed') q = q.eq('action', 'REMOVED');
    const { data } = await q.limit(500);
    setLogs(data || []);
    setLoading(false);
  }, [filters]);

  useEffect(() => { fetchLogs(); }, [fetchLogs]);

  const fSet = (k, v) => setFilters(f => ({ ...f, [k]: v }));

  const exportCSV = () => {
    const headers = ['Action','Lock No','Lock Type','Eq Tag','Eq Name','By','ID No','Reason','Permit','Box Slot','Date/Time'];
    const rows = logs.map(l => [l.action, l.lock_no, l.lock_type, l.eq_tag, l.eq_name, l.by_name, l.by_id_no, l.reason, l.permit||'', l.box_slot||'', l.action_at ? new Date(l.action_at).toLocaleString() : '']);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'loto_report.csv'; a.click();
  };

  const generatePDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const now = new Date();
    doc.setFontSize(16); doc.setFont('helvetica', 'bold');
    doc.text('SMART LOTO — Official Lockout/Tagout Report', 148, 15, { align: 'center' });
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    const rNo = `LR-${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    doc.text(`Report No: ${rNo}`, 14, 28);
    doc.text(`Generated By: ${session.full_name} (${session.id_no})`, 14, 34);
    doc.text(`Date Generated: ${now.toLocaleString()}`, 14, 40);
    if (filters.dateFrom || filters.dateTo) doc.text(`Date Range: ${filters.dateFrom||'—'} to ${filters.dateTo||'—'}`, 14, 46);

    const applied = logs.filter(l => l.action === 'APPLIED');
    let y = 58;
    const cols = [14, 30, 55, 72, 90, 105, 125, 155, 175, 205, 230, 255];
    const headers = ['Eq Tag','Eq Name','Lock No','Type','Permit','Applied By','Applied At','Removed By','Removed At','Duration','Status'];
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
    headers.forEach((h, i) => { if (cols[i]) doc.text(h, cols[i], y); });
    y += 5; doc.setFont('helvetica', 'normal'); doc.line(14, y, 283, y); y += 4;

    applied.forEach(a => {
      if (y > 185) { doc.addPage(); y = 20; }
      const removed = logs.find(r => r.action === 'REMOVED' && r.lock_no === a.lock_no && r.eq_tag === a.eq_tag && new Date(r.action_at) > new Date(a.action_at));
      let dur = 'Active';
      if (removed) { const ms = new Date(removed.action_at) - new Date(a.action_at); dur = `${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`; }
      const row = [
        (a.eq_tag||'').slice(0,10), (a.eq_name||'').slice(0,14), (a.lock_no||'').slice(0,10),
        (a.lock_type||'').slice(0,8), (a.permit||'').slice(0,12), (a.by_name||'').slice(0,14),
        a.action_at ? new Date(a.action_at).toLocaleDateString('en-GB') : '',
        removed ? (removed.by_name||'').slice(0,14) : '—',
        removed ? new Date(removed.action_at).toLocaleDateString('en-GB') : '—',
        dur, removed ? 'Completed' : 'Active'
      ];
      row.forEach((c, i) => { if (cols[i]) doc.text(String(c), cols[i], y); });
      y += 6;
    });
    if (applied.length === 0) doc.text('No records found for selected filters.', 14, y);
    y += 14; doc.line(14, y, 283, y); y += 8;
    doc.text('Supervisor: _______________________________    Date: _______________', 14, y);
    doc.save('smart_loto_official_report.pdf');
  };

  return (
    <div className="main">
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{ margin: 0 }}>Reports</div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button className={`btn btn-sm ${reportType === 'internal' ? 'btn-accent' : 'btn-ghost'}`} onClick={() => setReportType('internal')}>Internal Report</button>
            <button className={`btn btn-sm ${reportType === 'pdf' ? 'btn-accent' : 'btn-ghost'}`} onClick={() => setReportType('pdf')}>Official PDF</button>
          </div>
        </div>
        <div className="filter-row" style={{ marginBottom: 14 }}>
          {[
            { label: 'Date From', el: <input type="date" value={filters.dateFrom} onChange={e => fSet('dateFrom', e.target.value)} /> },
            { label: 'Date To',   el: <input type="date" value={filters.dateTo}   onChange={e => fSet('dateTo',   e.target.value)} /> },
            { label: 'Person',    el: <input type="text" value={filters.person}   onChange={e => fSet('person',   e.target.value)} placeholder="Name..." /> },
            { label: 'Eq Tag',    el: <input type="text" value={filters.tag}      onChange={e => fSet('tag',      e.target.value)} placeholder="Tag..." /> },
            { label: 'Status',    el: <select value={filters.status} onChange={e => fSet('status', e.target.value)}><option value="all">All</option><option value="active">Active</option><option value="completed">Completed</option></select> },
            { label: 'Lock Type', el: <select value={filters.lockType} onChange={e => fSet('lockType', e.target.value)}><option value="all">All</option><option value="operations">Operations</option><option value="mechanical">Mechanical</option><option value="electrical">Electrical</option></select> },
          ].map((f, i) => (
            <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              <label className="form-label">{f.label}</label>
              {f.el}
            </div>
          ))}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, justifyContent: 'flex-end' }}>
            <button className="btn btn-accent" onClick={fetchLogs} disabled={loading}>{loading ? 'Loading...' : 'Apply'}</button>
          </div>
        </div>
        {reportType === 'internal' && <>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <span style={{ fontSize: 12, color: 'var(--muted)' }}>{logs.length} records</span>
            <button className="btn btn-ghost btn-sm" onClick={exportCSV}>⬇ Export CSV</button>
          </div>
          <div className="ovr-x">
            <table>
              <thead><tr><th>Action</th><th>Lock No</th><th>Type</th><th>Equipment</th><th>By</th><th>Reason</th><th>Permit</th><th>Box Slot</th><th>Date/Time</th></tr></thead>
              <tbody>
                {logs.map(l => (
                  <tr key={l.id}>
                    <td><span className={`badge ${l.action === 'APPLIED' ? 'badge-red' : 'badge-green'}`}>{l.action}</span></td>
                    <td><span style={{ fontFamily: 'monospace', fontWeight: 700, color: lockColor(l.lock_type) }}>{l.lock_no}</span></td>
                    <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_type}</span></td>
                    <td>{l.eq_tag}{l.eq_name && <span style={{ color: 'var(--muted)', fontSize: 11 }}> — {l.eq_name}</span>}</td>
                    <td>{l.by_name}<br /><span style={{ fontSize: 10, color: 'var(--muted)' }}>{l.by_id_no}</span></td>
                    <td>{l.reason || '—'}</td>
                    <td>{l.permit || '—'}</td>
                    <td>{l.box_slot || '—'}</td>
                    <td style={{ fontSize: 11, whiteSpace: 'nowrap' }}>{l.action_at ? new Date(l.action_at).toLocaleString() : ''}</td>
                  </tr>
                ))}
                {!loading && logs.length === 0 && <tr><td colSpan={9} className="empty">No records found.</td></tr>}
              </tbody>
            </table>
          </div>
        </>}
        {reportType === 'pdf' && (
          <div style={{ textAlign: 'center', padding: '30px 0' }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>Official PDF Report</div>
            <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 20, maxWidth: 480, margin: '0 auto 20px' }}>
              Generates a formatted landscape PDF using current filter settings. Includes equipment, lock details, applied/removed times, duration, and supervisor signature line.
            </div>
            <button className="btn btn-accent" style={{ fontSize: 14, padding: '10px 28px' }} onClick={generatePDF}>⬇ Download PDF Report</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SUPERVISOR: PERSONNEL TAB ─────────────────────────────────────────────────
function SuperPersonnel() {
  const [personnel, setPersonnel] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [q, setQ] = useState('');
  const [form, setForm] = useState({ full_name: '', id_no: '', employee_id: '', role: 'operations', company: '', shift: '' });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  const fetchPersonnel = useCallback(async () => {
    setLoading(true);
    const { data } = await db.from('personnel').select('*').order('full_name');
    setPersonnel(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { fetchPersonnel(); }, [fetchPersonnel]);

  const filtered = personnel.filter(p => !q || p.full_name.toLowerCase().includes(q.toLowerCase()) || (p.id_no||'').includes(q));

  const handleAdd = async () => {
    if (!form.full_name || !form.id_no) { setErr('Name and ID No required.'); return; }
    setSaving(true);
    const { error } = await db.from('personnel').insert({ ...form, active: true, first_login: true, password_hash: null });
    if (error) { setErr(error.message); setSaving(false); return; }
    toast('Employee added'); setShowAdd(false); fetchPersonnel(); setSaving(false);
  };

  const toggleActive = async p => {
    await db.from('personnel').update({ active: !p.active }).eq('id', p.id);
    toast(p.active ? 'Employee deactivated' : 'Employee activated');
    fetchPersonnel();
    setSelected(s => s ? { ...s, active: !s.active } : null);
  };

  const resetPassword = async p => {
    await db.from('personnel').update({ first_login: true, password_hash: null }).eq('id', p.id);
    toast(`Password reset for ${p.full_name}`);
  };

  const changeRole = async (p, newRole) => {
    await db.from('personnel').update({ role: newRole }).eq('id', p.id);
    toast('Role updated'); fetchPersonnel();
    setSelected(s => s ? { ...s, role: newRole } : null);
  };

  return (
    <div className="main">
      <div className="two-col">
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin: 0 }}>Personnel ({personnel.length})</div>
            <button className="btn btn-accent" onClick={() => { setShowAdd(true); setErr(''); setForm({ full_name:'', id_no:'', employee_id:'', role:'operations', company:'', shift:'' }); }}>+ Add Employee</button>
          </div>
          <div className="search-row" style={{ marginBottom: 12 }}>
            <div className="search-box" style={{ flex: 1 }}>
              <span style={{ color: 'var(--muted)' }}>🔍</span>
              <input type="text" placeholder="Search by name or ID..." value={q} onChange={e => setQ(e.target.value)} />
            </div>
          </div>
          {loading ? <div className="loading-center"><div className="spin" /></div> : (
            <div className="emp-list">
              {filtered.map(p => (
                <div key={p.id} className={`emp-item ${selected?.id === p.id ? 'on' : ''}`} onClick={() => setSelected(p)}>
                  <div className="emp-avatar">{(p.full_name || '?').charAt(0).toUpperCase()}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.full_name}</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)' }}>{p.id_no} · {p.company}</div>
                  </div>
                  <span className={`role-badge role-${p.role}`}>{p.role}</span>
                  {!p.active && <span className="badge badge-gray" style={{ fontSize: 10 }}>Inactive</span>}
                </div>
              ))}
              {filtered.length === 0 && <div className="empty">No employees found.</div>}
            </div>
          )}
        </div>
        <div>
          {selected ? (
            <div className="detail-panel">
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div className="emp-avatar" style={{ width: 48, height: 48, fontSize: 20, borderRadius: '50%' }}>{(selected.full_name||'?').charAt(0).toUpperCase()}</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{selected.full_name}</div>
                  <div style={{ fontSize: 12, color: 'var(--muted)' }}>{selected.id_no}</div>
                </div>
              </div>
              <div className="detail-row"><span className="detail-label">Employee ID</span><span>{selected.employee_id || '—'}</span></div>
              <div className="detail-row">
                <span className="detail-label">Role</span>
                <select value={selected.role} onChange={e => changeRole(selected, e.target.value)}
                  style={{ background: 'var(--s3)', border: '1px solid var(--b)', color: '#E2E8F0', borderRadius: 6, padding: '3px 8px', fontSize: 12 }}>
                  <option value="supervisor">Supervisor</option>
                  <option value="operations">Operations</option>
                  <option value="mechanical">Mechanical</option>
                  <option value="electrical">Electrical</option>
                </select>
              </div>
              <div className="detail-row"><span className="detail-label">Company</span><span>{selected.company || '—'}</span></div>
              <div className="detail-row"><span className="detail-label">Shift</span><span>{selected.shift || '—'}</span></div>
              <div className="detail-row"><span className="detail-label">Status</span><span className={`badge ${selected.active ? 'badge-green' : 'badge-gray'}`}>{selected.active ? 'Active' : 'Inactive'}</span></div>
              <div className="detail-row"><span className="detail-label">First Login</span><span style={{ fontSize: 12, color: selected.first_login ? 'var(--warn)' : '#86efac' }}>{selected.first_login ? 'Password not set' : 'Password set'}</span></div>
              <div className="detail-row"><span className="detail-label">Last Login</span><span style={{ fontSize: 11 }}>{selected.last_login ? new Date(selected.last_login).toLocaleString() : 'Never'}</span></div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 16 }}>
                <button className="btn btn-warn" onClick={() => resetPassword(selected)}>Reset Password</button>
                <button className={`btn ${selected.active ? 'btn-danger' : 'btn-ghost'}`} onClick={() => toggleActive(selected)}>
                  {selected.active ? 'Deactivate Employee' : 'Activate Employee'}
                </button>
              </div>
            </div>
          ) : (
            <div className="detail-panel" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 200, color: 'var(--muted)', fontSize: 13 }}>
              Select an employee to view details
            </div>
          )}
        </div>
      </div>
      {showAdd && (
        <Modal title="Add New Employee" onClose={() => setShowAdd(false)}
          footer={<>
            <button className="btn btn-ghost" onClick={() => setShowAdd(false)}>Cancel</button>
            <button className="btn btn-accent" onClick={handleAdd} disabled={saving}>{saving ? 'Adding...' : 'Add Employee'}</button>
          </>}>
          {err && <div className="alert alert-danger">{err}</div>}
          <div className="form-row">
            <div className="form-group"><label className="form-label">Full Name *</label><input type="text" value={form.full_name} onChange={e => setForm(f => ({ ...f, full_name: e.target.value }))} style={{ width: '100%' }} /></div>
            <div className="form-group"><label className="form-label">ID No *</label><input type="text" value={form.id_no} onChange={e => setForm(f => ({ ...f, id_no: e.target.value }))} style={{ width: '100%' }} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Employee ID</label><input type="text" value={form.employee_id} onChange={e => setForm(f => ({ ...f, employee_id: e.target.value }))} style={{ width: '100%' }} /></div>
            <div className="form-group"><label className="form-label">Role</label>
              <select value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))} style={{ width: '100%' }}>
                <option value="supervisor">Supervisor</option>
                <option value="operations">Operations</option>
                <option value="mechanical">Mechanical</option>
                <option value="electrical">Electrical</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Company</label><input type="text" value={form.company} onChange={e => setForm(f => ({ ...f, company: e.target.value }))} style={{ width: '100%' }} /></div>
            <div className="form-group"><label className="form-label">Shift</label><input type="text" value={form.shift} onChange={e => setForm(f => ({ ...f, shift: e.target.value }))} style={{ width: '100%' }} placeholder="e.g. Day/Night/A/B" /></div>
          </div>
          <div className="alert alert-warn" style={{ marginTop: 4 }}>New employee must set a password on first login.</div>
        </Modal>
      )}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [idNo, setIdNo] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const { data, error } = await db.from('personnel').select('*').eq('id_no', idNo.trim()).eq('active', true).single();
      if (error || !data) { setErr('Employee not found or inactive.'); setLoading(false); return; }
      if (!data.password_hash || data.first_login) { onLogin({ ...data, _needSetPw: true }); return; }
      const hash = await sha256(pw);
      if (hash !== data.password_hash) { setErr('Incorrect password.'); setLoading(false); return; }
      await db.from('personnel').update({ last_login: new Date().toISOString() }).eq('id', data.id);
      const session = { id: data.id, full_name: data.full_name, id_no: data.id_no, role: data.role, company: data.company, shift: data.shift };
      localStorage.setItem('loto_session', JSON.stringify(session));
      onLogin(session);
    } catch (ex) { setErr('Error: ' + ex.message); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="login-icon">L</div>
          <div className="login-title">Smart LOTO</div>
          <div className="login-sub">Lockout/Tagout Management System</div>
        </div>
        {err && <div className="alert alert-danger">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">Employee I.D. No</label>
            <input type="text" value={idNo} onChange={e => setIdNo(e.target.value)} required placeholder="e.g. EMP-001" style={{ width: '100%' }} />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Enter password" style={{ width: '100%' }} />
          </div>
          <button className="btn btn-accent" type="submit" disabled={loading} style={{ width: '100%', marginTop: 8, padding: '10px' }}>
            {loading ? 'Signing in...' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── SET PASSWORD ──────────────────────────────────────────────────────────────
function SetPasswordScreen({ user, onDone }) {
  const [pw1, setPw1] = useState('');
  const [pw2, setPw2] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault(); setErr('');
    if (pw1.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    if (pw1 !== pw2)    { setErr('Passwords do not match.'); return; }
    setLoading(true);
    const hash = await sha256(pw1);
    const { error } = await db.from('personnel').update({ password_hash: hash, first_login: false, last_login: new Date().toISOString() }).eq('id', user.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    const session = { id: user.id, full_name: user.full_name, id_no: user.id_no, role: user.role, company: user.company, shift: user.shift };
    localStorage.setItem('loto_session', JSON.stringify(session));
    toast('Password set successfully!');
    onDone(session);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="login-icon">L</div>
          <div className="login-title">Set Your Password</div>
          <div className="login-sub">Welcome, {user.full_name}. Please set a new password to continue.</div>
        </div>
        {err && <div className="alert alert-danger">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">New Password (min 6 characters)</label>
            <input type="password" value={pw1} onChange={e => setPw1(e.target.value)} required style={{ width: '100%' }} />
          </div>
          <div className="form-group">
            <label className="form-label">Confirm Password</label>
            <input type="password" value={pw2} onChange={e => setPw2(e.target.value)} required style={{ width: '100%' }} />
          </div>
          <button className="btn btn-accent" type="submit" disabled={loading} style={{ width: '100%', marginTop: 8, padding: '10px' }}>
            {loading ? 'Saving...' : 'Set Password & Continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession]       = useState(null);
  const [pendingUser, setPendingUser] = useState(null);
  const [equipment, setEquipment]   = useState([]);
  const [locks, setLocks]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const timerRef = useRef(null);

  useEffect(() => {
    const stored = localStorage.getItem('loto_session');
    if (stored) { try { setSession(JSON.parse(stored)); } catch (e) {} }
    setLoading(false);
  }, []);

  const fetchData = useCallback(async () => {
    const [eqRes, lockRes] = await Promise.all([
      db.from('equipment').select('*').order('tag'),
      db.from('locks').select('*').order('lock_no'),
    ]);
    setEquipment(eqRes.data || []);
    setLocks(lockRes.data || []);
  }, []);

  useEffect(() => {
    if (!session) return;
    fetchData();
    timerRef.current = setInterval(fetchData, 30000);
    return () => clearInterval(timerRef.current);
  }, [session, fetchData]);

  const handleLogin = user => {
    if (user._needSetPw) { setPendingUser(user); return; }
    setSession(user);
  };

  const handleSetPwDone = sess => { setPendingUser(null); setSession(sess); };

  const handleLogout = () => {
    localStorage.removeItem('loto_session');
    setSession(null); setEquipment([]); setLocks([]);
  };

  if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}><div className="spin" /></div>;
  if (pendingUser) return <><SetPasswordScreen user={pendingUser} onDone={handleSetPwDone} /><Toasts /></>;
  if (!session)    return <><LoginScreen onLogin={handleLogin} /><Toasts /></>;

  return (
    <>
      <nav>
        <div className="brand">
          <div className="brand-icon">L</div>
          <div>
            <div className="brand-text">Smart LOTO</div>
            <div className="brand-sub">Lockout/Tagout System</div>
          </div>
        </div>
        <div className="live-pill">
          <div className="live-dot" />
          <span>LIVE</span>
        </div>
        <div className="nav-right">
          <div className="user-pill">
            <span style={{ fontWeight: 700 }}>{session.full_name}</span>
            <span className={`role-badge role-${session.role}`}>{session.role}</span>
            {session.shift && <span style={{ fontSize: 10, color: 'var(--muted)' }}>Shift: {session.shift}</span>}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout}>Sign Out</button>
        </div>
      </nav>
      {session.role === 'supervisor'  && <SupervisorApp session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {session.role === 'operations'  && <OperationsApp session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {(session.role === 'mechanical' || session.role === 'electrical') && <MechElecApp session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      <Toasts />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
