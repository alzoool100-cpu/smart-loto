<script type="text/babel" data-presets="react" charset="utf-8">
const { useState, useEffect, useCallback, useRef, Fragment } = React;
const { createClient } = supabase;

const SUPA_URL = 'https://nbgmfvzrfylmhzwjwewl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iZ21mdnpyZnlsbWh6d2p3ZXdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTIyODMsImV4cCI6MjA5NDI2ODI4M30.Ir8-Ot9xib5wulL1uV2S8HKl1lTB1Ou8wlpuJe-tixg';
const db = createClient(SUPA_URL, SUPA_KEY);

const REASONS = ['Routine Maintenance','Coupling Replacement','Bearing Replacement','Seal Replacement','Inspection','Electrical Work','Valve Maintenance','Motor Replacement','Decommissioned','Other'];

const MCC_ROOMS = {
  '60K-A':  { plant:'60K',    racks:['SA.10','SA.12','SA.14','SA.16'], color:'#22c55e' },
  '60K-B':  { plant:'60K',    racks:['SA.18','SA.20','SA.22'],         color:'#86efac' },
  '120K-A': { plant:'120K',   racks:['SA.30','SA.32','SA.34'],         color:'#3b82f6' },
  '120K-B': { plant:'120K',   racks:['SA.36','SA.38'],                 color:'#60a5fa' },
  'UTIL':   { plant:'Utility',racks:['SA.50','SA.52'],                  color:'#f59e0b' },
};

// ── SHA-256 ──────────────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── TOAST SYSTEM ─────────────────────────────────────────────────────────────
let _setToasts = null;
function toast(msg, type = 'ok') {
  if (_setToasts) _setToasts(ts => [...ts, { id: Date.now() + Math.random(), msg, type }]);
}

function Toasts() {
  const [toasts, setToasts] = useState([]);
  _setToasts = setToasts;
  useEffect(() => {
    if (!toasts.length) return;
    const t = setTimeout(() => setToasts(ts => ts.slice(1)), 3000);
    return () => clearTimeout(t);
  }, [toasts]);
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function lockColor(type) {
  if (type === 'operations') return '#22c55e';
  if (type === 'mechanical') return '#3b82f6';
  if (type === 'electrical') return '#ef4444';
  return '#94a3b8';
}
function lockBadgeClass(type) {
  if (type === 'operations') return 'badge-green';
  if (type === 'mechanical') return 'badge-blue';
  if (type === 'electrical') return 'badge-red';
  return 'badge-gray';
}
function roleLockType(role) {
  if (role === 'operations'        || role === 'ops_supervisor')       return 'operations';
  if (role === 'mechanical'        || role === 'mech_supervisor'
                                   || role === 'mech_superintendent')  return 'mechanical';
  if (role === 'electrical'        || role === 'elec_supervisor'
                                   || role === 'elec_superintendent')  return 'electrical';
  return null;
}
const ROLE_OPTIONS = [
  { value: 'admin',               label: 'Admin (Program Manager)'         },
  { value: 'hse',                 label: 'HSE Supervisor'                   },
  { value: 'superintendent',      label: 'Plant Superintendent'             },
  { value: 'auditor',             label: 'Internal Auditor'                 },
  { value: 'ops_supervisor',      label: 'Operations Shift Supervisor'      },
  { value: 'operations',          label: 'Operations Technician'            },
  { value: 'mech_superintendent', label: 'Mechanical Superintendent'        },
  { value: 'mech_supervisor',     label: 'Mechanical Supervisor'            },
  { value: 'mechanical',          label: 'Mechanical Technician'            },
  { value: 'elec_superintendent', label: 'Electrical Superintendent'        },
  { value: 'elec_supervisor',     label: 'Electrical Supervisor'            },
  { value: 'electrical',          label: 'Electrical Technician'            },
];
function roleDisplay(role) {
  return (ROLE_OPTIONS.find(r => r.value === role) || {}).label || role;
}
function isViewOnly(role) {
  return ['hse','superintendent'].includes(role);
}
function isDeptSuperintendent(role) {
  return role === 'mech_superintendent' || role === 'elec_superintendent';
}

// ── BOX CONFIG ────────────────────────────────────────────────────────────────
const BOX_CONFIG = {
  operations: { cols: ['A','B','C','D','E','F','G','H'], rows: 8 },
  mechanical:  { cols: ['A','B','C','D','E'],             rows: 5 },
  electrical:  { cols: ['A','B','C','D','E'],             rows: 5 },
};
function getBoxSlots(lockType) {
  const cfg = BOX_CONFIG[lockType] || BOX_CONFIG.operations;
  const slots = [];
  for (let r = 1; r <= cfg.rows; r++) for (const c of cfg.cols) slots.push(`${c}${r}`);
  return slots;
}

// ── BOX VIEW (reusable) ───────────────────────────────────────────────────────
function BoxView({ lockType, locks, equipment }) {
  const cfg    = BOX_CONFIG[lockType] || BOX_CONFIG.operations;
  const slots  = getBoxSlots(lockType);
  const cols   = cfg.cols.length;
  const color  = lockColor(lockType);
  const [popup, setPopup] = useState(null);
  const bySlot = {};
  locks.filter(l => l.lock_type === lockType && l.status === 'applied' && l.box_slot)
       .forEach(l => { bySlot[l.box_slot] = l; });
  const applied   = locks.filter(l => l.lock_type === lockType && l.status === 'applied').length;
  const available = locks.filter(l => l.lock_type === lockType && l.status === 'available').length;
  const label = lockType.charAt(0).toUpperCase() + lockType.slice(1);
  const size  = `${cols}×${cfg.rows}`;
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:6, flexWrap:'wrap' }}>
        <span style={{ fontSize:12, fontWeight:700, color }}>{label} Box ({size})</span>
        <span style={{ fontSize:11, color:'var(--muted)' }}>
          🔒 {applied} applied &nbsp;|&nbsp; 🔓 {available} available
        </span>
        <span style={{ fontSize:10, color:'var(--muted)' }}>• tap occupied slot for details</span>
      </div>
      <div className={`box-grid-${cols}`}>
        {slots.map(slot => {
          const lk = bySlot[slot];
          return (
            <div key={slot} className={`box-slot${lk ? ' box-slot-pick' : ''}`}
              onClick={() => lk && setPopup(popup?.id === lk.id ? null : lk)}
              style={{ borderColor: lk ? color : 'var(--b)', background: popup?.id === lk?.id ? `${color}44` : lk ? `${color}22` : 'var(--s2)', borderWidth: lk ? 2 : 1 }}
              title={lk ? `${lk.lock_no} — tap for details` : `Slot ${slot} — empty`}>

  const applied = locks.filter(l => l.lock_type === lockType && l.status === 'applied');

      </div>
      {q.trim() !== '' && results.length === 0 && <div className="empty">No results for "{q}"</div>}
      {results.map(l => {
        const eq = equipment && equipment.find(e => e.id === l.equipment_id);
        const hrs = l.applied_at ? ((Date.now() - new Date(l.applied_at)) / 3600000).toFixed(1) : null;
        return (

// ── PHOTO HELPERS ─────────────────────────────────────────────────────────────
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Compression failed')), 'image/jpeg', 0.65);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
    img.src = url;
  });
}

async function uploadLockPhoto(file, lockNo, photoType) {
  const blob  = await compressImage(file);
  const path  = `${lockNo}/${Date.now()}_${photoType}.jpg`;
  const { error } = await db.storage.from('lock-photos').upload(path, blob, { contentType: 'image/jpeg', upsert: true });
  if (error) throw new Error(error.message);
  const { data } = db.storage.from('lock-photos').getPublicUrl(path);
  return data.publicUrl;
}

// ── PRINT DANGER TAG ─────────────────────────────────────────────────────────
function printDangerTag(info) {
  const appliedDate = info.applied_at ? new Date(info.applied_at) : new Date();
  const fmtS = d => d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const appliedStr = fmtS(appliedDate);
  const expStr = info.expected_done_at ? fmtS(new Date(info.expected_done_at)) : '—';
  const lockTypeShort = info.lock_type ? info.lock_type.toUpperCase().slice(0,4) : '';
  const trunc = (s, n) => (s && s.length > n) ? s.slice(0,n)+'…' : (s||'—');

  const row = (label, value) =>
    `<tr>` +
    `<td style="padding:1px 2px;font-weight:700;white-space:nowrap;border-bottom:0.5px solid #ccc;font-size:5.8pt;width:37%">${label}</td>` +
    `<td style="padding:1px 2px;border-bottom:0.5px solid #ccc;font-size:5.8pt">${trunc(value,20)}</td>` +
    `</tr>`;

  const tag = (num, label, color) =>
    `<div style="width:50mm;min-height:100mm;box-sizing:border-box;border:2px solid #000;background:#fff;color:#000;font-family:'Courier New',monospace;display:flex;flex-direction:column">` +
      `<div style="background:#CC0000;color:#fff;text-align:center;padding:3px 2px;font-size:11pt;font-weight:900;letter-spacing:.06em;line-height:1.1">⚠ DANGER ⚠</div>` +
      `<div style="background:#000;color:#fff;text-align:center;padding:1.5px 2px;font-size:5pt;font-weight:700;letter-spacing:.05em">DO NOT OPERATE · DO NOT REMOVE TAG</div>` +
      `<div style="background:${color};color:#fff;text-align:center;padding:1.5px 2px;font-size:5pt;font-weight:700">COPY ${num}/3 — ${label}</div>` +
      `<table style="width:100%;border-collapse:collapse;flex:1">` +
        row('Equip No:', info.eq_tag) +
        row('Desc:', info.eq_name) +
        row('Lock No:', info.lock_no + (lockTypeShort ? ` (${lockTypeShort})` : '')) +
        row('Box Slot:', info.box_slot) +
        row('Permit:', info.permit) +
        row('Reason:', info.reason) +
        row('Applied:', appliedStr) +
        row('Exp. Done:', expStr) +
      `</table>` +
      `<div style="border-top:1.5px solid #000;padding:1px 2px">` +
        `<table style="width:100%;border-collapse:collapse">` +
          row('Name:', info.full_name) +
          row('I.D. No:', info.id_no) +
          row('Company:', info.company) +
          `<tr><td colspan="2" style="font-size:5.8pt;font-weight:700;padding:1px 2px">Signature:</td></tr>` +
          `<tr><td colspan="2" style="border-top:1px solid #000;height:10mm">&nbsp;</td></tr>` +
        `</table>` +
      `</div>` +
    `</div>`;

  const el = document.getElementById('danger-tag');
  el.innerHTML =
    `<div style="display:flex;flex-direction:row;align-items:flex-start;justify-content:center;gap:6mm;padding:5mm;background:#fff;min-height:100vh">` +
      tag(1,'ISOLATION POINT','#CC0000') +
      tag(2,'KEY IN LOCK BOX','#1d4ed8') +
      tag(3,'FIELD COPY','#166534') +
    `</div>`;
  el.style.display = 'block';
  setTimeout(() => { window.print(); el.style.display = 'none'; el.innerHTML = ''; }, 150);
}

// ── APPLY LOCK MODAL ──────────────────────────────────────────────────────────
function ApplyLockModal({ equipment: eq, session, lockType, locks, onClose, onApplied }) {
  const [lock, setLock] = useState(null);
  const [boxSlot, setBoxSlot] = useState(null);
  const [expectedHours, setExpectedHours] = useState('');
  const [reason, setReason] = useState('Routine Maintenance');
  const [otherReason, setOtherReason] = useState('');
  const [permit, setPermit] = useState('');
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [err, setErr] = useState('');
  const [photo1, setPhoto1] = useState(null);
  const [photo2, setPhoto2] = useState(null);

  const handleApply = async () => {
    if (!lock) { setErr('Please select a lock.'); return; }
    if (!boxSlot) { setErr('Please select a box slot for the key.'); return; }
    setErr(''); setLoading(true); setLoadingMsg('Applying lock...');
    const { data: existing } = await db.from('locks').select('id')
      .eq('equipment_id', eq.id).eq('lock_type', lockType).eq('status', 'applied');
    if (existing && existing.length > 0) {
      setErr(`This equipment already has a ${lockType} lock applied.`);
      setLoading(false); return;
    }
    if (lockType !== 'operations') {
      const { data: opsLocks } = await db.from('locks').select('id')
        .eq('equipment_id', eq.id).eq('lock_type', 'operations').eq('status', 'applied');
      if (!opsLocks || opsLocks.length === 0) {
        setErr('Cannot apply: No operations lock on this equipment. Operations must lock out first.');
        setLoading(false); return;
      }
    }
    const finalReason = reason === 'Other' ? (otherReason || 'Other') : reason;
    const now = new Date().toISOString();
    const expectedDoneAt = expectedHours ? new Date(Date.now() + Number(expectedHours) * 3600000).toISOString() : null;
    const { error } = await db.from('locks').update({
      status: 'applied', equipment_id: eq.id,
      applied_by: session.full_name, applied_id_no: session.id_no,
      reason: finalReason, permit, applied_at: now,
      box_slot: boxSlot,
      expected_hours: expectedHours ? Number(expectedHours) : null,
      expected_done_at: expectedDoneAt,
    }).eq('id', lock.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    await db.from('audit_log').insert({
      action: 'APPLIED', lock_no: lock.lock_no, lock_type: lockType,
      eq_tag: eq.tag, eq_name: eq.name,
      by_name: session.full_name, by_id_no: session.id_no,
      reason: finalReason, box_slot: lock.box_slot, action_at: now
    });
    // Upload photos if provided
    if (photo1 || photo2) {
      setLoadingMsg('Uploading photos...');
      try {
        const inserts = [];
        if (photo1) {
          const url = await uploadLockPhoto(photo1, lock.lock_no, 'on_breaker');
          inserts.push({ lock_no: lock.lock_no, equipment_id: eq.id, photo_type: 'on_breaker', photo_url: url, taken_by: session.full_name, taken_by_id: session.id_no });
        }
        if (photo2) {
          const url = await uploadLockPhoto(photo2, lock.lock_no, 'key_in_box');
          inserts.push({ lock_no: lock.lock_no, equipment_id: eq.id, photo_type: 'key_in_box', photo_url: url, taken_by: session.full_name, taken_by_id: session.id_no });
        }
        if (inserts.length) await db.from('lock_photos').insert(inserts);
      } catch (e) {
        toast('Lock applied — photo upload failed: ' + e.message);
      }
    }
    toast(`Lock ${lock.lock_no} applied to ${eq.tag}${(photo1||photo2) ? ' with photo' : ''}`);
    onApplied({ lock_no: lock.lock_no, eq_tag: eq.tag, eq_name: eq.name, id_no: session.id_no, full_name: session.full_name, company: session.company, permit, reason: finalReason, lock_type: lockType, box_slot: boxSlot, applied_at: now, expected_done_at: expectedDoneAt });
    setLoading(false);
  };

  return (
    <Modal title={`Apply ${lockType} Lock — ${eq.tag}`} onClose={onClose}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose} disabled={loading}>Cancel</button>
        <button className="btn btn-accent" onClick={handleApply} disabled={loading}>
          {loading ? loadingMsg : 'Apply Lock'}

      {err && <div className="alert alert-danger">{err}</div>}

        <label className="form-label">Select {lockType} lock</label>
        <LockPicker lockType={lockType} onSelect={setLock} selected={lock} />

        <BoxSlotPicker lockType={lockType} locks={locks} selected={boxSlot} onSelect={setBoxSlot} />
      </div>
      <div className="form-group" style={{ borderTop:'1px solid var(--b)', paddingTop:12 }}>
        <label className="form-label">⏱ Expected Completion Time (optional)</label>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          {['','1','2','3','4','6','8','12'].map(h => (
            <button key={h} type="button"
              className={`btn btn-sm ${expectedHours === h && h !== '' ? 'btn-accent' : 'btn-ghost'}`}
              onClick={() => setExpectedHours(h)}>

        </div>
        {expectedHours && <div style={{ fontSize:11, color:'var(--accent)', marginTop:5 }}>
          Alert 30 min before: {new Date(Date.now() + Number(expectedHours) * 3600000 - 1800000).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
        </div>}
      </div>
      <div className="form-group">
        <label className="form-label">Reason</label>
        <select value={reason} onChange={e => setReason(e.target.value)} style={{ width:'100%' }}>
          {REASONS.map(r => <option key={r}>{r}</option>)}
        </select>
      </div>
      {reason === 'Other' && (
        <div className="form-group">
          <label className="form-label">Specify reason</label>
          <input type="text" value={otherReason} onChange={e => setOtherReason(e.target.value)} style={{ width:'100%' }} />

    </Modal>
  );
}

// ── REMOVE LOCK MODAL ─────────────────────────────────────────────────────────
function RemoveLockModal({ lock, equipment: eq, session, onClose, onRemoved }) {
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [err, setErr] = useState('');
  const [photo, setPhoto] = useState(null);

  const handleRemove = async () => {
    setLoading(true); setLoadingMsg('Removing lock...');
    if (lock.lock_type === 'operations') {
      const { data: others } = await db.from('locks').select('id')
        .eq('equipment_id', eq.id).in('lock_type', ['mechanical', 'electrical']).eq('status', 'applied');
      if (others && others.length > 0) {
        setErr('Cannot remove operations lock: mechanical or electrical locks are still applied.');
        setLoading(false); return;
      }
    }
    const { error } = await db.from('locks').update({
      status: 'available', equipment_id: null, applied_by: null,
      applied_id_no: null, reason: null, permit: null, applied_at: null
    }).eq('id', lock.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    await db.from('audit_log').insert({
      action: 'REMOVED', lock_no: lock.lock_no, lock_type: lock.lock_type,
      eq_tag: eq.tag, eq_name: eq.name,
      by_name: session.full_name, by_id_no: session.id_no,
      reason: lock.reason, box_slot: lock.box_slot,
      action_at: new Date().toISOString()
    });
    if (photo) {
      setLoadingMsg('Uploading photo...');
      try {
        const url = await uploadLockPhoto(photo, lock.lock_no, 'on_hook');
        await db.from('lock_photos').insert({
          lock_no: lock.lock_no, equipment_id: eq.id,
          photo_type: 'on_hook', photo_url: url,
          taken_by: session.full_name, taken_by_id: session.id_no
        });
      } catch (e) {
        toast('Lock removed — photo upload failed: ' + e.message);
      }
    }
    toast(`Lock ${lock.lock_no} removed from ${eq.tag}${photo ? ' with photo' : ''}`);
    onRemoved();
  };

  return (
    <Modal title={`Remove ${lock.lock_type} Lock`} onClose={onClose}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose} disabled={loading}>Cancel</button>
        <button className="btn btn-danger" onClick={handleRemove} disabled={loading}>
          {loading ? loadingMsg : 'Remove Lock'}
        </button>
      </>}>
      {err && <div className="alert alert-danger">{err}</div>}
      <p style={{ fontSize:13, marginBottom:12 }}>
        Remove lock <strong style={{ color:lockColor(lock.lock_type) }}>{lock.lock_no}</strong> from <strong>{eq.tag} — {eq.name}</strong>?
      </p>
      <div className="detail-panel" style={{ fontSize:12, marginBottom:12 }}>
        <div className="detail-row"><span className="detail-label">Applied By</span><span>{lock.applied_by}</span></div>
        <div className="detail-row"><span className="detail-label">Reason</span><span>{lock.reason}</span></div>
        <div className="detail-row"><span className="detail-label">Work Permit</span><span>{lock.permit || '—'}</span></div>
      </div>
      <div style={{ borderTop:'1px solid var(--b)', paddingTop:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:'var(--accent)', marginBottom:8 }}>📷 Photo (optional)</div>
        <PhotoCapture label="Lock returned to Hook" file={photo} onFile={setPhoto} />
      </div>
    </Modal>
  );
}

        {mechLocks.length > 0 && role !== 'operations' && role !== 'electrical' && <span className="badge badge-blue">MECH: {mechLocks[0].lock_no}</span>}
        {elecLocks.length > 0 && role !== 'operations' && role !== 'mechanical' && <span className="badge badge-red">ELEC: {elecLocks[0].lock_no}</span>}

        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>

            <button className="btn btn-sm btn-accent" onClick={() => onAction('apply', eq)}>
              Apply {myLockType} Lock

            <button className="tag-print-btn btn-sm" onClick={() => printDangerTag({ eq_tag: eq.tag, eq_name: eq.name, lock_no: myLocks[0].lock_no, lock_type: myLocks[0].lock_type, box_slot: myLocks[0].box_slot, id_no: session.id_no, full_name: session.full_name, company: session.company, permit: myLocks[0].permit, reason: myLocks[0].reason, applied_at: myLocks[0].applied_at, expected_done_at: myLocks[0].expected_done_at })}>

  const rooms = ['all', ...Object.keys(MCC_ROOMS)];

    const mq = !q || e.tag.toLowerCase().includes(q.toLowerCase()) || e.name.toLowerCase().includes(q.toLowerCase());
    const mr = roomFilter === 'all' || e.mcc_room === roomFilter;
    return mq && mr;
  });

  return (
    <div className="main">
      {violations.length > 0 && (
        <div className="seq-alert">
          <span>⚠</span>
          <span><strong>Sequence Violation:</strong> {violations.length} equipment has mech/elec lock but NO ops lock: {violations.map(v => v.tag).join(', ')}</span>
        </div>
      )}
      <div className="stats-grid">
        {[
          { num: equipment.length,                          label: 'Total Equipment',   color: '#94a3b8' },
          { num: equipment.filter(e => !e.decommissioned).length, label: 'Active Equipment', color: 'var(--accent)' },
          { num: opsLocked,  label: 'Operations Locks', color: '#22c55e' },
          { num: mechLocked, label: 'Mechanical Locks', color: '#3b82f6' },
          { num: elecLocked, label: 'Electrical Locks', color: '#ef4444' },
        ].map((s, i) => (
          <div key={i} className="stat-card">
            <div className="stat-num" style={{ color: s.color }}>{s.num}</div>
            <div className="stat-label">{s.label}</div>
            <div className="stat-bar" style={{ background: s.color, opacity: .3 }} />
          </div>
        ))}
      </div>
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{ margin: 0 }}>Equipment Overview</div>
        </div>
        <div className="search-row" style={{ marginBottom: 12 }}>
          <div className="search-box" style={{ flex: 1 }}>
            <span style={{ color: 'var(--muted)' }}>🔍</span>
            <input type="text" placeholder="Search equipment..." value={q} onChange={e => setQ(e.target.value)} />
          </div>
          <select value={roomFilter} onChange={e => setRoomFilter(e.target.value)}>
            {rooms.map(r => <option key={r} value={r}>{r === 'all' ? 'All Rooms' : r}</option>)}
          </select>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 10 }}>
          {filtered.map(eq => {
            const opsL  = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'operations'  && l.status === 'applied');
            const mechL = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'mechanical'  && l.status === 'applied');
            const elecL = locks.filter(l => l.equipment_id === eq.id && l.lock_type === 'electrical'  && l.status === 'applied');
            return (
              <div key={eq.id} className="eq-card">
                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                  <div>
                    <div className="eq-tag">{eq.tag}</div>
                    <div className="eq-name">{eq.name}</div>
                    <div className="eq-loc">{eq.plant} → {eq.mcc_room} → {eq.rack} → {eq.row_position} → {eq.breaker_no || '—'}</div>
                  </div>
                  {eq.decommissioned && <span className="badge badge-gray">Decomm.</span>}
                </div>
                <div className="eq-locks">
                  {opsL.length > 0  && <span className="badge badge-green">OPS: {opsL[0].lock_no}</span>}
                  {mechL.length > 0 && <span className="badge badge-blue">MECH: {mechL[0].lock_no}</span>}
                  {elecL.length > 0 && <span className="badge badge-red">ELEC: {elecL[0].lock_no}</span>}
                  {!opsL.length && !mechL.length && !elecL.length && <span className="badge badge-gray">No Locks</span>}
                </div>
              </div>
            );
          })}
          {filtered.length === 0 && <div className="empty" style={{ gridColumn: '1/-1' }}>No equipment found.</div>}
        </div>
      </div>
    </div>
  );
}

function SuperLocks({ locks, equipment, onRefresh }) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ lock_no: '', lock_type: 'operations', box_slot: '' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [filterType, setFilterType] = useState('all');

  const BOX_SLOTS = getBoxSlots('operations');

  const handleAdd = async () => {
    if (!form.lock_no) { setErr('Lock number required.'); return; }
    setLoading(true);
    const { error } = await db.from('locks').insert({ lock_no: form.lock_no, lock_type: form.lock_type, status: 'available', box_slot: form.box_slot || null });
    if (error) { setErr(error.message); setLoading(false); return; }
    toast('Lock added'); setShowAdd(false); onRefresh(); setLoading(false);
  };

  const filteredLocks = filterType === 'all' ? locks : locks.filter(l => l.lock_type === filterType);
  const appliedLocks = filteredLocks.filter(l => l.status === 'applied');

  return (
    <div className="main">
      <div className="card">
        <div className="section-header"><div className="card-title" style={{ margin: 0 }}>Box Slot Visualization (8×8)</div></div>
        <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 8 }}>Columns A–H, Rows 1–8 | 🔒 = applied, color = lock type</div>
        <div className="box-grid-8">
          {BOX_SLOTS.map(slot => {
            const applied = locks.find(l => l.box_slot === slot && l.status === 'applied');
            const avail   = locks.find(l => l.box_slot === slot && l.status === 'available');
            const color   = applied ? lockColor(applied.lock_type) : avail ? lockColor(avail.lock_type) : null;
            return (
              <div key={slot} className="box-slot"
                style={{ borderColor: color || 'var(--b)', background: applied ? `${color}22` : avail ? `${color}11` : 'var(--s2)', borderWidth: applied ? 2 : 1 }}>
                <div className="box-slot-label">{slot}</div>
                {applied && <span style={{ fontSize: 8, fontWeight: 800, color, marginTop: 10 }}>{applied.lock_no}</span>}
                {applied && <span style={{ fontSize: 7 }}>🔒</span>}
                {!applied && avail && <span style={{ fontSize: 8, color, opacity: .6, marginTop: 10 }}>{avail.lock_no}</span>}
              </div>
            );
          })}
        </div>
      </div>
      <div className="card">
        <div className="section-header"><div className="card-title" style={{ margin: 0 }}>Hooks Board</div></div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
          {['all','operations','mechanical','electrical'].map(t => (
            <button key={t} className={`btn btn-sm ${filterType === t ? 'btn-accent' : 'btn-ghost'}`} onClick={() => setFilterType(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </button>
          ))}
        </div>
        <div className="hooks-board">
          {filteredLocks.map(l => (
            <div key={l.id} className={`hook ${l.lock_type === 'operations' ? 'ops' : l.lock_type === 'mechanical' ? 'mech' : 'elec'}`}
              style={{ opacity: l.status === 'available' ? .5 : 1 }}>
              <span style={{ fontSize: 8 }}>{l.status === 'applied' ? '🔒' : '🔓'}</span>
              <span style={{ fontSize: 9 }}>{l.lock_no}</span>
              {l.box_slot && <span style={{ fontSize: 7, opacity: .7 }}>{l.box_slot}</span>}
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{ margin: 0 }}>Applied Locks ({appliedLocks.length})</div>
          <button className="btn btn-accent" onClick={() => { setShowAdd(true); setErr(''); }}>+ Add Lock</button>
        </div>
        <div className="ovr-x">
          <table>
            <thead><tr><th>Lock No</th><th>Type</th><th>Equipment</th><th>Applied By</th><th>Reason</th><th>Permit</th><th>Box Slot</th><th>Applied At</th></tr></thead>
            <tbody>
              {appliedLocks.map(l => {
                const eq = equipment.find(e => e.id === l.equipment_id);

                    <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_type}</span></td>

                    <td>{l.applied_by}<br /><span style={{ fontSize: 10, color: 'var(--muted)' }}>{l.applied_id_no}</span></td>
                    <td>{l.reason || '—'}</td>
                    <td>{l.permit || '—'}</td>
                    <td>{l.box_slot || '—'}</td>
                    <td style={{ fontSize: 11 }}>{l.applied_at ? new Date(l.applied_at).toLocaleString() : ''}</td>

        </div>
      </div>

            <button className="btn btn-accent" onClick={handleAdd} disabled={loading}>{loading ? 'Adding...' : 'Add Lock'}</button>

          <div className="form-group"><label className="form-label">Lock Type</label>

// ── SUPERVISOR: REPORTS TAB ───────────────────────────────────────────────────
function SuperReports({ session, equipment, locks }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ dateFrom: '', dateTo: '', person: '', tag: '', status: 'all', lockType: 'all' });
  const [reportType, setReportType] = useState('history');
  const [eqHistTag, setEqHistTag] = useState('');
  const [eqHistLogs, setEqHistLogs] = useState([]);
  const [eqHistLoading, setEqHistLoading] = useState(false);

  const fetchLogs = useCallback(async () => {
    setLoading(true);
    let q = db.from('audit_log').select('*').order('action_at', { ascending: false });
    if (filters.dateFrom) q = q.gte('action_at', filters.dateFrom + 'T00:00:00');
    if (filters.dateTo)   q = q.lte('action_at', filters.dateTo   + 'T23:59:59');
    if (filters.person)   q = q.ilike('by_name', `%${filters.person}%`);
    if (filters.tag)      q = q.ilike('eq_tag',  `%${filters.tag}%`);
    if (filters.lockType !== 'all') q = q.eq('lock_type', filters.lockType);
    if (filters.status === 'active')    q = q.eq('action', 'APPLIED');
    if (filters.status === 'completed') q = q.eq('action', 'REMOVED');
    const { data } = await q.limit(500);
    setLogs(data || []);
    setLoading(false);
  }, [filters]);

  useEffect(() => { fetchLogs(); }, [fetchLogs]);
  const fSet = (k, v) => setFilters(f => ({ ...f, [k]: v }));

  const fetchEqHistory = async () => {
    if (!eqHistTag.trim()) return;
    setEqHistLoading(true);
    const { data } = await db.from('audit_log').select('*')
      .ilike('eq_tag', `%${eqHistTag.trim()}%`)
      .order('action_at', { ascending: false }).limit(300);
    setEqHistLogs(data || []);
    setEqHistLoading(false);
  };

  const exportCSV = () => {
    const headers = ['Action','Lock No','Lock Type','Eq Tag','Eq Name','By','ID No','Reason','Permit','Box Slot','Date/Time'];
    const rows = logs.map(l => [l.action, l.lock_no, l.lock_type, l.eq_tag, l.eq_name, l.by_name, l.by_id_no, l.reason, l.permit||'', l.box_slot||'', l.action_at ? new Date(l.action_at).toLocaleString() : '']);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'loto_history.csv'; a.click();
  };

  const now = new Date();
  const activeLocks  = (locks || []).filter(l => l.status === 'applied');
  const activeOps    = activeLocks.filter(l => l.lock_type === 'operations');
  const activeMech   = activeLocks.filter(l => l.lock_type === 'mechanical');
  const activeElec   = activeLocks.filter(l => l.lock_type === 'electrical');
  const overdueList  = activeLocks
    .filter(l => l.expected_done_at && new Date(l.expected_done_at) < now)
    .map(l => { const ms = now - new Date(l.expected_done_at); return { ...l, eq: (equipment||[]).find(e=>e.id===l.equipment_id), hoursOvr: Math.floor(ms/3600000), minsOvr: Math.floor((ms%3600000)/60000) }; })
    .sort((a,b) => new Date(a.expected_done_at) - new Date(b.expected_done_at));

  const buildEqHistory = () => {
    const applied = eqHistLogs.filter(l => l.action === 'APPLIED');
    return applied.map(a => {
      const removed = eqHistLogs.find(r => r.action === 'REMOVED' && r.lock_no === a.lock_no && new Date(r.action_at) > new Date(a.action_at));
      const ms = removed ? new Date(removed.action_at) - new Date(a.action_at) : null;
      return { ...a, removed, duration: ms ? `${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m` : 'Active' };
    });
  };

  const generateHandoverPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const ts = now.toLocaleString();
    doc.setFontSize(15); doc.setFont('helvetica', 'bold');
    doc.text('SMART LOTO — SHIFT HANDOVER REPORT', 148, 14, { align: 'center' });
    doc.setFontSize(8); doc.setFont('helvetica', 'normal');
    doc.text(`Generated: ${ts}`, 14, 22);
    doc.text(`By: ${session.full_name} (${session.id_no})`, 14, 27);
    doc.text(`Active Locks — OPS: ${activeOps.length}  MECH: ${activeMech.length}  ELEC: ${activeElec.length}  TOTAL: ${activeLocks.length}`, 14, 32);
    let y = 40;
    const drawSection = (title, data, rgb) => {
      if (!data.length) return;
      doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
      doc.setTextColor(...rgb); doc.text(`${title} (${data.length})`, 14, y); y += 5;
      doc.setTextColor(0,0,0); doc.setFontSize(7.5);
      const cols = [14, 34, 78, 118, 142, 168, 210, 248];
      const hdrs = ['Lock No','Equipment','Description','Box Slot','Applied By','Applied At','Exp. Done','Reason'];
      doc.setFont('helvetica','bold'); hdrs.forEach((h,i)=>doc.text(h,cols[i],y)); y+=3;
      doc.line(14,y,283,y); y+=3; doc.setFont('helvetica','normal');
      data.forEach(l => {
        if (y > 186) { doc.addPage(); y = 14; }
        const eq = (equipment||[]).find(e=>e.id===l.equipment_id);
        const fmtD = d => new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
        [l.lock_no, eq?.tag||'—', (eq?.name||'').slice(0,20), l.box_slot||'—', (l.applied_by||'').slice(0,14),
         l.applied_at?fmtD(l.applied_at):'—', l.expected_done_at?fmtD(l.expected_done_at):'—', (l.reason||'').slice(0,16)]
          .forEach((v,i)=>doc.text(String(v),cols[i],y));
        y+=5;
      });
      y+=4; doc.line(14,y,283,y); y+=6;
    };
    drawSection('OPERATIONS LOCKS', activeOps, [34,197,94]);
    drawSection('MECHANICAL LOCKS', activeMech, [59,130,246]);
    drawSection('ELECTRICAL LOCKS', activeElec, [239,68,68]);
    if (activeLocks.length===0) doc.text('No active locks at this time.',14,y);
    if (y<182) {
      y = Math.max(y,170);
      doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text('Outgoing Supervisor: ____________________________  Sign: _________________  Time: __________', 14, y); y+=9;
      doc.text('Incoming Supervisor: ____________________________  Sign: _________________  Time: __________', 14, y);
    }
    doc.save(`handover_${now.toISOString().slice(0,10)}.pdf`);
  };

  const generateOfficialPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const n = new Date();
    const rNo = `LR-${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    doc.setFontSize(16); doc.setFont('helvetica','bold');
    doc.text('SMART LOTO — Official Lockout/Tagout Report', 148, 15, { align:'center' });
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text(`Report No: ${rNo}`, 14, 28);
    doc.text(`Generated By: ${session.full_name} (${session.id_no})`, 14, 34);
    doc.text(`Date Generated: ${n.toLocaleString()}`, 14, 40);
    if (filters.dateFrom||filters.dateTo) doc.text(`Date Range: ${filters.dateFrom||'—'} to ${filters.dateTo||'—'}`, 14, 46);
    const applied = logs.filter(l => l.action==='APPLIED');
    let y = 58;
    const cols = [14,30,55,72,90,105,125,155,175,205,230,255];
    const hdrs = ['Eq Tag','Eq Name','Lock No','Type','Permit','Applied By','Applied At','Removed By','Removed At','Duration','Status'];
    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    hdrs.forEach((h,i)=>{ if(cols[i]) doc.text(h,cols[i],y); }); y+=5;
    doc.setFont('helvetica','normal'); doc.line(14,y,283,y); y+=4;
    applied.forEach(a => {
      if (y>185) { doc.addPage(); y=20; }
      const rem = logs.find(r=>r.action==='REMOVED'&&r.lock_no===a.lock_no&&r.eq_tag===a.eq_tag&&new Date(r.action_at)>new Date(a.action_at));
      let dur='Active';
      if(rem){const ms=new Date(rem.action_at)-new Date(a.action_at);dur=`${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`;}
      [(a.eq_tag||'').slice(0,10),(a.eq_name||'').slice(0,14),(a.lock_no||'').slice(0,10),(a.lock_type||'').slice(0,8),
       (a.permit||'').slice(0,12),(a.by_name||'').slice(0,14),a.action_at?new Date(a.action_at).toLocaleDateString('en-GB'):'',
       rem?(rem.by_name||'').slice(0,14):'—',rem?new Date(rem.action_at).toLocaleDateString('en-GB'):'—',dur,rem?'Completed':'Active']
        .forEach((c,i)=>{ if(cols[i]) doc.text(String(c),cols[i],y); }); y+=6;
    });
    if(!applied.length) doc.text('No records found for selected filters.',14,y);
    y+=14; doc.line(14,y,283,y); y+=8;
    doc.text('Supervisor: _______________________________    Date: _______________', 14, y);
    doc.save('smart_loto_official_report.pdf');
  };

  const RTABS = [
    { id:'history',  label:'📋 History Log' },
    { id:'handover', label:'🔄 Shift Handover' },
    { id:'eq_hist',  label:'🏭 Equipment History' },
    { id:'overdue',  label:`⚠ Overdue (${overdueList.length})` },
    { id:'pdf',      label:'📄 Official PDF' },
  ];

  return (
    <div className="main">
      <div className="card" style={{ padding:'10px 14px' }}>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {RTABS.map(t => (
            <button key={t.id} className={`btn btn-sm ${reportType===t.id?'btn-accent':'btn-ghost'}`}
              onClick={() => setReportType(t.id)}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* ── HISTORY LOG ── */}
      {reportType === 'history' && (
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin:0 }}>History Log</div>
            <button className="btn btn-ghost btn-sm" onClick={exportCSV}>⬇ CSV</button>
          </div>
          <div className="filter-row" style={{ marginBottom:14 }}>
            {[
              { label:'Date From', el:<input type="date" value={filters.dateFrom} onChange={e=>fSet('dateFrom',e.target.value)} /> },
              { label:'Date To',   el:<input type="date" value={filters.dateTo}   onChange={e=>fSet('dateTo',  e.target.value)} /> },
              { label:'Person',    el:<input type="text" value={filters.person}   onChange={e=>fSet('person',  e.target.value)} placeholder="Name..." /> },
              { label:'Eq Tag',    el:<input type="text" value={filters.tag}      onChange={e=>fSet('tag',     e.target.value)} placeholder="Tag..." /> },
              { label:'Status',    el:<select value={filters.status}   onChange={e=>fSet('status',  e.target.value)}><option value="all">All</option><option value="active">Applied</option><option value="completed">Removed</option></select> },
              { label:'Lock Type', el:<select value={filters.lockType} onChange={e=>fSet('lockType',e.target.value)}><option value="all">All</option><option value="operations">Operations</option><option value="mechanical">Mechanical</option><option value="electrical">Electrical</option></select> },
            ].map((f,i) => (
              <div key={i} style={{ display:'flex', flexDirection:'column', gap:4 }}>
                <label className="form-label">{f.label}</label>{f.el}
              </div>
            ))}
            <div style={{ display:'flex', flexDirection:'column', gap:4, justifyContent:'flex-end' }}>
              <button className="btn btn-accent" onClick={fetchLogs} disabled={loading}>{loading?'Loading...':'Apply'}</button>
            </div>
          </div>
          <div style={{ fontSize:12, color:'var(--muted)', marginBottom:8 }}>{logs.length} records</div>
          <div className="ovr-x">
            <table>
              <thead><tr><th>Action</th><th>Lock No</th><th>Type</th><th>Equipment</th><th>By</th><th>Reason</th><th>Permit</th><th>Slot</th><th>Date/Time</th></tr></thead>
              <tbody>
                {logs.map(l => (
                  <tr key={l.id}>
                    <td><span className={`badge ${l.action==='APPLIED'?'badge-red':'badge-green'}`}>{l.action}</span></td>
                    <td><span style={{ fontFamily:'monospace', fontWeight:700, color:lockColor(l.lock_type) }}>{l.lock_no}</span></td>
                    <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_type}</span></td>
                    <td>{l.eq_tag}{l.eq_name&&<span style={{ color:'var(--muted)', fontSize:11 }}> — {l.eq_name}</span>}</td>
                    <td>{l.by_name}<br/><span style={{ fontSize:10, color:'var(--muted)' }}>{l.by_id_no}</span></td>
                    <td>{l.reason||'—'}</td>
                    <td>{l.permit||'—'}</td>
                    <td>{l.box_slot||'—'}</td>
                    <td style={{ fontSize:11, whiteSpace:'nowrap' }}>{l.action_at?new Date(l.action_at).toLocaleString():''}</td>
                  </tr>
                ))}
                {!loading&&logs.length===0&&<tr><td colSpan={9} className="empty">No records found.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── SHIFT HANDOVER ── */}
      {reportType === 'handover' && (
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin:0 }}>Shift Handover Report</div>
            <button className="btn btn-accent btn-sm" onClick={generateHandoverPDF}>⬇ Download PDF</button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:16 }}>
            {[
              { n:activeLocks.length, label:'Total Active', color:'var(--accent)' },
              { n:activeOps.length,   label:'Operations',   color:'#22c55e' },
              { n:activeMech.length,  label:'Mechanical',   color:'#3b82f6' },
              { n:activeElec.length,  label:'Electrical',   color:'#ef4444' },
            ].map(s => (
              <div key={s.label} className="stat-card">
                <div className="stat-num" style={{ color:s.color }}>{s.n}</div>
                <div className="stat-label">{s.label}</div>
                <div className="stat-bar" style={{ background:s.color }} />
              </div>
            ))}
          </div>
          {activeLocks.length===0 && <div className="empty" style={{ color:'#22c55e' }}>✓ No active locks at this time.</div>}
          {[
            { type:'operations', data:activeOps,  color:'#22c55e', cls:'badge-green' },
            { type:'mechanical', data:activeMech, color:'#3b82f6', cls:'badge-blue'  },
            { type:'electrical', data:activeElec, color:'#ef4444', cls:'badge-red'   },
          ].map(({ type, data, color, cls }) => data.length>0 && (
            <div key={type} style={{ marginBottom:16 }}>
              <div style={{ fontWeight:700, color, marginBottom:6, textTransform:'uppercase', fontSize:12 }}>{type} Locks ({data.length})</div>
              <div className="ovr-x">
                <table>
                  <thead><tr><th>Lock No</th><th>Equipment</th><th>Box Slot</th><th>Applied By</th><th>Applied At</th><th>Exp. Done</th><th>Reason</th></tr></thead>
                  <tbody>
                    {data.map(l => {
                      const eq = (equipment||[]).find(e=>e.id===l.equipment_id);
                      const ovr = l.expected_done_at && new Date(l.expected_done_at) < now;
                      return (
                        <tr key={l.id}>
                          <td><span className={`badge ${cls}`}>{l.lock_no}</span></td>
                          <td>{eq?`${eq.tag} — ${eq.name}`:'—'}</td>
                          <td style={{ fontFamily:'monospace', color:'var(--warn)' }}>{l.box_slot||'—'}</td>
                          <td>{l.applied_by}</td>
                          <td style={{ fontSize:11 }}>{l.applied_at?new Date(l.applied_at).toLocaleString():'—'}</td>
                          <td style={{ fontSize:11, color:ovr?'#ef4444':'inherit' }}>
                            {l.expected_done_at?new Date(l.expected_done_at).toLocaleString():'—'}{ovr&&' ⚠'}
                          </td>
                          <td>{l.reason||'—'}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── EQUIPMENT HISTORY ── */}
      {reportType === 'eq_hist' && (
        <div className="card">
          <div className="card-title">Equipment History Card</div>
          <div style={{ display:'flex', gap:8, marginBottom:16 }}>
            <input type="text" value={eqHistTag} onChange={e=>setEqHistTag(e.target.value)}
              placeholder="Enter equipment tag (e.g. P-101A)..." style={{ flex:1 }}
              onKeyDown={e=>e.key==='Enter'&&fetchEqHistory()} />
            <button className="btn btn-accent" onClick={fetchEqHistory} disabled={eqHistLoading}>
              {eqHistLoading?'Loading...':'Search'}
            </button>
          </div>
          {!eqHistTag && <div className="empty">Enter an equipment tag to view its full lock history.</div>}
          {eqHistTag && !eqHistLoading && eqHistLogs.length===0 && <div className="empty">No records found for "{eqHistTag}"</div>}
          {eqHistLogs.length>0 && (() => {
            const hist = buildEqHistory();
            const eq = (equipment||[]).find(e=>e.tag.toLowerCase().includes(eqHistTag.toLowerCase().trim()));
            return (
              <>
                {eq && (
                  <div className="detail-panel" style={{ marginBottom:12 }}>
                    <div className="detail-row"><span className="detail-label">Tag</span><span className="eq-tag">{eq.tag}</span></div>
                    <div className="detail-row"><span className="detail-label">Name</span><span>{eq.name}</span></div>
                    <div className="detail-row"><span className="detail-label">Location</span><span>{eq.plant} → {eq.mcc_room} → {eq.rack} → {eq.row_position}</span></div>
                    <div className="detail-row"><span className="detail-label">Total Lock Events</span><span style={{ fontWeight:700 }}>{hist.length}</span></div>
                  </div>
                )}
                <div className="ovr-x">
                  <table>
                    <thead><tr><th>#</th><th>Lock No</th><th>Type</th><th>Applied By</th><th>Applied At</th><th>Removed By</th><th>Removed At</th><th>Duration</th><th>Reason</th><th>Permit</th></tr></thead>
                    <tbody>
                      {hist.map((h,i) => (
                        <tr key={h.id}>
                          <td style={{ color:'var(--muted)' }}>{i+1}</td>
                          <td><span className={`badge ${lockBadgeClass(h.lock_type)}`}>{h.lock_no}</span></td>
                          <td><span className={`badge ${lockBadgeClass(h.lock_type)}`}>{h.lock_type}</span></td>
                          <td>{h.by_name}<br/><span style={{ fontSize:10, color:'var(--muted)' }}>{h.by_id_no}</span></td>
                          <td style={{ fontSize:11 }}>{new Date(h.action_at).toLocaleString()}</td>
                          <td>{h.removed?<>{h.removed.by_name}<br/><span style={{ fontSize:10, color:'var(--muted)' }}>{h.removed.by_id_no}</span></>:<span className="badge badge-red">Active</span>}</td>
                          <td style={{ fontSize:11 }}>{h.removed?new Date(h.removed.action_at).toLocaleString():'—'}</td>
                          <td><span className={`badge ${h.removed?'badge-gray':'badge-amber'}`}>{h.duration}</span></td>
                          <td>{h.reason||'—'}</td>
                          <td>{h.permit||'—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            );
          })()}
        </div>
      )}

      {/* ── OVERDUE ── */}
      {reportType === 'overdue' && (
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin:0 }}>⚠ Overdue Locks</div>
            <span style={{ fontSize:12, color:'var(--muted)' }}>Auto-refreshes with page</span>
          </div>
          {overdueList.length===0 && <div className="empty" style={{ color:'#22c55e' }}>✓ No overdue locks — all locks within expected time.</div>}
          {overdueList.length>0 && (
            <div className="ovr-x">
              <table>
                <thead><tr><th>Lock No</th><th>Type</th><th>Equipment</th><th>Box Slot</th><th>Applied By</th><th>Expected Done</th><th>Overdue By</th><th>Reason</th></tr></thead>
                <tbody>
                  {overdueList.map(l => (
                    <tr key={l.id}>
                      <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_no}</span></td>
                      <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_type}</span></td>
                      <td>{l.eq?`${l.eq.tag} — ${l.eq.name}`:'—'}</td>
                      <td style={{ fontFamily:'monospace', color:'var(--warn)' }}>{l.box_slot||'—'}</td>
                      <td>{l.applied_by}</td>
                      <td style={{ color:'#ef4444', fontSize:11 }}>{new Date(l.expected_done_at).toLocaleString()}</td>
                      <td><span className="badge badge-red">{l.hoursOvr}h {l.minsOvr}m</span></td>
                      <td>{l.reason||'—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ── OFFICIAL PDF ── */}
      {reportType === 'pdf' && (
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin:0 }}>Official PDF Report</div>
          </div>
          <div className="filter-row" style={{ marginBottom:14 }}>
            {[
              { label:'Date From', el:<input type="date" value={filters.dateFrom} onChange={e=>fSet('dateFrom',e.target.value)} /> },
              { label:'Date To',   el:<input type="date" value={filters.dateTo}   onChange={e=>fSet('dateTo',  e.target.value)} /> },
              { label:'Person',    el:<input type="text" value={filters.person}   onChange={e=>fSet('person',  e.target.value)} placeholder="Name..." /> },
              { label:'Eq Tag',    el:<input type="text" value={filters.tag}      onChange={e=>fSet('tag',     e.target.value)} placeholder="Tag..." /> },
              { label:'Lock Type', el:<select value={filters.lockType} onChange={e=>fSet('lockType',e.target.value)}><option value="all">All</option><option value="operations">Operations</option><option value="mechanical">Mechanical</option><option value="electrical">Electrical</option></select> },
            ].map((f,i)=>(
              <div key={i} style={{ display:'flex', flexDirection:'column', gap:4 }}>
                <label className="form-label">{f.label}</label>{f.el}
              </div>
            ))}
            <div style={{ display:'flex', flexDirection:'column', gap:4, justifyContent:'flex-end' }}>
              <button className="btn btn-accent" onClick={fetchLogs} disabled={loading}>{loading?'Loading...':'Load Data'}</button>
            </div>
          </div>
          <div style={{ textAlign:'center', padding:'20px 0' }}>
            <div style={{ fontSize:13, color:'var(--muted)', marginBottom:16 }}>
              {logs.length} records loaded — generates a landscape PDF with applied/removed pairs, duration, and supervisor signature.
            </div>
            <button className="btn btn-accent" style={{ fontSize:14, padding:'10px 28px' }} onClick={generateOfficialPDF} disabled={!logs.length}>
              ⬇ Download PDF Report
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SUPERVISOR: PERSONNEL TAB ─────────────────────────────────────────────────
function SuperPersonnel() {
  const [personnel, setPersonnel] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [q, setQ] = useState('');
  const [form, setForm] = useState({ full_name: '', id_no: '', employee_id: '', role: 'operations', company: '', shift: '', group: '' });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  const fetchPersonnel = useCallback(async () => {
    setLoading(true);
    const { data } = await db.from('personnel').select('*').order('full_name');
    setPersonnel(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { fetchPersonnel(); }, [fetchPersonnel]);

  const filtered = personnel.filter(p => !q || p.full_name.toLowerCase().includes(q.toLowerCase()) || (p.id_no||'').includes(q));

  const handleAdd = async () => {
    if (!form.full_name || !form.id_no) { setErr('Name and ID No required.'); return; }
    setSaving(true);
    const { error } = await db.from('personnel').insert({ ...form, active: true, first_login: true, password_hash: null });
    if (error) { setErr(error.message); setSaving(false); return; }
    toast('Employee added'); setShowAdd(false); fetchPersonnel(); setSaving(false);
  };

  const toggleActive = async p => {
    await db.from('personnel').update({ active: !p.active }).eq('id', p.id);
    toast(p.active ? 'Employee deactivated' : 'Employee activated');
    fetchPersonnel();
    setSelected(s => s ? { ...s, active: !s.active } : null);
  };

  const resetPassword = async p => {
    await db.from('personnel').update({ first_login: true, password_hash: null }).eq('id', p.id);
    toast(`Password reset for ${p.full_name}`);
  };

  const changeRole = async (p, newRole) => {
    await db.from('personnel').update({ role: newRole }).eq('id', p.id);
    toast('Role updated'); fetchPersonnel();
    setSelected(s => s ? { ...s, role: newRole } : null);
  };

  return (
    <div className="main">
      <div className="two-col">
        <div className="card">
          <div className="section-header">
            <div className="card-title" style={{ margin: 0 }}>Personnel ({personnel.length})</div>
            <button className="btn btn-accent" onClick={() => { setShowAdd(true); setErr(''); setForm({ full_name:'', id_no:'', employee_id:'', role:'operations', company:'', shift:'', group:'' }); }}>+ Add Employee</button>
          </div>
          <div className="search-row" style={{ marginBottom: 12 }}>
            <div className="search-box" style={{ flex: 1 }}>
              <span style={{ color: 'var(--muted)' }}>🔍</span>
              <input type="text" placeholder="Search by name or ID..." value={q} onChange={e => setQ(e.target.value)} />
            </div>
          </div>
          {loading ? <div className="loading-center"><div className="spin" /></div> : (
            <div className="emp-list">
              {filtered.map(p => (
                <div key={p.id} className={`emp-item ${selected?.id === p.id ? 'on' : ''}`} onClick={() => setSelected(p)}>
                  <div className="emp-avatar">{(p.full_name || '?').charAt(0).toUpperCase()}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.full_name}</div>
                    <div style={{ fontSize: 11, color: 'var(--muted)' }}>{p.id_no} · {p.company}</div>
                  </div>
                  <span className={`role-badge role-${p.role}`}>{roleDisplay(p.role)}</span>
                  {!p.active && <span className="badge badge-gray" style={{ fontSize: 10 }}>Inactive</span>}
                </div>
              ))}
              {filtered.length === 0 && <div className="empty">No employees found.</div>}
            </div>
          )}
        </div>
        <div>
          {selected ? (
            <div className="detail-panel">
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
                <div className="emp-avatar" style={{ width: 48, height: 48, fontSize: 20, borderRadius: '50%' }}>{(selected.full_name||'?').charAt(0).toUpperCase()}</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 16 }}>{selected.full_name}</div>

// ── PLANT MAP TAB ─────────────────────────────────────────────────────────────
function PlantMapTab({ equipment, locks }) {
  const [view, setView] = useState({ level: 1, plant: null, room: null });
  const now = new Date();

  const STATUS = {
    clean:   { color:'#22c55e', bg:'rgba(34,197,94,.1)',   border:'rgba(34,197,94,.35)',   icon:'✓', label:'Clean'   },
    partial: { color:'#f59e0b', bg:'rgba(245,158,11,.1)',  border:'rgba(245,158,11,.35)',  icon:'⚡', label:'OPS Only' },
    locked:  { color:'#ef4444', bg:'rgba(239,68,68,.1)',   border:'rgba(239,68,68,.35)',   icon:'🔒', label:'Locked'  },
    overdue: { color:'#a855f7', bg:'rgba(168,85,247,.1)',  border:'rgba(168,85,247,.35)',  icon:'⏰', label:'Overdue' },
  };

  const eqStatus = eq => {
    const al = locks.filter(l => l.equipment_id === eq.id && l.status === 'applied');
    if (!al.length) return 'clean';
    if (al.some(l => l.expected_done_at && new Date(l.expected_done_at) < now)) return 'overdue';
    const hasOps = al.some(l => l.lock_type === 'operations');
    const hasME  = al.some(l => l.lock_type === 'mechanical' || l.lock_type === 'electrical');
    if (hasOps && !hasME) return 'partial';
    return 'locked';
  };

  const groupStatus = list => {
    const ss = list.map(eqStatus);
    if (ss.some(s => s === 'overdue')) return 'overdue';
    if (ss.some(s => s === 'locked'))  return 'locked';
    if (ss.some(s => s === 'partial')) return 'partial';
    return 'clean';
  };

  const plants  = [...new Set(Object.values(MCC_ROOMS).map(r => r.plant))].sort();
  const roomsForPlant = view.plant
    ? Object.entries(MCC_ROOMS).filter(([,r]) => r.plant === view.plant)
    : [];
  const racksForRoom = view.room ? (MCC_ROOMS[view.room]?.racks || []) : [];

  const lockBadge = lockType =>
    lockType === 'operations' ? 'badge-green' : lockType === 'mechanical' ? 'badge-blue' : 'badge-red';

  const Card = ({ onClick, cfg, title, sub, extraBadge }) => (
    <div onClick={onClick} style={{ border:`2px solid ${cfg.border}`, background:cfg.bg, borderRadius:12,
      padding:16, cursor:'pointer', transition:'all .2s', userSelect:'none' }}
      onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
      onMouseLeave={e => e.currentTarget.style.transform='none'}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
        <div style={{ fontSize:16, fontWeight:800 }}>{title}</div>
        <span style={{ fontSize:20 }}>{cfg.icon}</span>
      </div>
      <div style={{ fontSize:11, color:'var(--muted)', marginBottom:10 }}>{sub}</div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        <span className="badge" style={{ background:cfg.bg, color:cfg.color, border:`1px solid ${cfg.border}` }}>
          {cfg.icon} {cfg.label}
        </span>
        {extraBadge}
      </div>
    </div>
  );

  return (
    <div className="main">
      {/* Breadcrumb */}
      <div className="card" style={{ padding:'10px 14px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:13 }}>
          <button className="btn btn-ghost btn-sm"
            onClick={() => setView({ level:1, plant:null, room:null })}>🏭 All Plants</button>
          {view.plant && <>
            <span style={{ color:'var(--muted)' }}>›</span>
            <button className="btn btn-ghost btn-sm"
              onClick={() => setView(v => ({ ...v, level:2, room:null }))}>{view.plant}</button>
          </>}
          {view.room && <>
            <span style={{ color:'var(--muted)' }}>›</span>
            <span style={{ color:'var(--accent)', fontWeight:700, padding:'4px 8px' }}>{view.room}</span>
          </>}
        </div>
      </div>

      {/* ── Level 1: Plants ── */}
      {view.level === 1 && (
        <div className="card">
          <div className="card-title">Plant Overview</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }}>
            {plants.map(plant => {
              const pEq  = equipment.filter(e => e.plant === plant);
              const cfg  = STATUS[groupStatus(pEq)];
              const actv = locks.filter(l => pEq.some(e => e.id===l.equipment_id) && l.status==='applied');
              return (
                <Card key={plant}
                  onClick={() => setView({ level:2, plant, room:null })}
                  cfg={cfg} title={plant}
                  sub={`${pEq.length} equipment · ${Object.entries(MCC_ROOMS).filter(([,r])=>r.plant===plant).length} MCC rooms`}
                  extraBadge={actv.length>0 && <span className="badge badge-red">{actv.length} active locks</span>}
                />
              );
            })}
          </div>
        </div>
      )}

      {/* ── Level 2: MCC Rooms ── */}
      {view.level === 2 && (
        <div className="card">
          <div className="card-title">{view.plant} — MCC Rooms</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }}>
            {roomsForPlant.map(([roomId, roomData]) => {
              const rEq  = equipment.filter(e => e.mcc_room === roomId);
              const cfg  = STATUS[groupStatus(rEq)];
              const actv = locks.filter(l => rEq.some(e=>e.id===l.equipment_id) && l.status==='applied');
              return (
                <Card key={roomId}
                  onClick={() => setView({ level:3, plant:view.plant, room:roomId })}
                  cfg={cfg} title={roomId}
                  sub={`${roomData.racks.length} racks · ${rEq.length} equipment`}
                  extraBadge={actv.length>0 && <span className="badge badge-red">{actv.length} locks</span>}
                />
              );
            })}
          </div>
        </div>
      )}

      {/* ── Level 3: Racks + Equipment ── */}
      {view.level === 3 && (
        <div className="card">
          <div className="card-title">{view.room} — Equipment</div>
          {racksForRoom.length === 0 && <div className="empty">No racks configured for this room.</div>}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:12 }}>
            {racksForRoom.map(rack => {
              const rEq = equipment.filter(e => e.mcc_room === view.room && e.rack === rack);
              const cfg = STATUS[groupStatus(rEq)];
              return (
                <div key={rack} style={{ border:`1.5px solid ${cfg.border}`, borderRadius:10, overflow:'hidden' }}>
                  {/* Rack header */}
                  <div style={{ background:cfg.bg, padding:'8px 12px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontWeight:700, fontFamily:'monospace', color:cfg.color, fontSize:13 }}>{rack}</span>
                    <span style={{ fontSize:16 }}>{cfg.icon}</span>
                  </div>
                  {/* Equipment rows */}
                  {rEq.length === 0 && (
                    <div style={{ padding:'10px 12px', fontSize:11, color:'var(--muted)' }}>No equipment</div>
                  )}
                  {rEq.map(eq => {
                    const al  = locks.filter(l => l.equipment_id === eq.id && l.status === 'applied');
                    const sc  = STATUS[eqStatus(eq)];
                    return (
                      <div key={eq.id} style={{ padding:'9px 12px', borderTop:'1px solid var(--b)',
                        display:'flex', justifyContent:'space-between', alignItems:'center', gap:8 }}>
                        <div style={{ minWidth:0 }}>
                          <div style={{ fontFamily:'monospace', fontSize:12, fontWeight:700, color:'var(--accent)', whiteSpace:'nowrap' }}>{eq.tag}</div>
                          <div style={{ fontSize:10, color:'var(--muted)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:110 }}>{eq.name}</div>
                        </div>
                        <div style={{ display:'flex', flexDirection:'column', gap:2, alignItems:'flex-end', flexShrink:0 }}>
                          {al.length === 0
                            ? <span style={{ fontSize:11, color:'#22c55e', fontWeight:600 }}>✓</span>
                            : al.map(l => (
                                <span key={l.id} className={`badge ${lockBadge(l.lock_type)}`} style={{ fontSize:9, padding:'1px 5px' }}>
                                  {l.lock_no}
                                </span>
                              ))
                          }
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── COMPLIANCE DASHBOARD ──────────────────────────────────────────────────────
function ComplianceDashboard({ equipment, locks, findings }) {
  const now = new Date();
  const al = locks.filter(l => l.status === 'applied');
  const noPermit = al.filter(l => !l.permit);
  const overdueL = al.filter(l => l.expected_done_at && new Date(l.expected_done_at) < now);
  const over24h  = al.filter(l => l.applied_at && (now - new Date(l.applied_at)) > 86400000);
  const seqViol  = equipment.filter(eq => {
    const hasME  = locks.some(l => l.equipment_id===eq.id && (l.lock_type==='mechanical'||l.lock_type==='electrical') && l.status==='applied');
    const hasOps = locks.some(l => l.equipment_id===eq.id && l.lock_type==='operations' && l.status==='applied');
    return hasME && !hasOps;
  });
  const fOpen  = findings.filter(f => f.status==='open');
  const fInPrg = findings.filter(f => f.status==='in_progress');
  const fOvr   = findings.filter(f => f.status!=='closed' && f.due_date && new Date(f.due_date) < now);
  const fCrit  = findings.filter(f => f.status!=='closed' && f.severity==='critical');
  const fClosed= findings.filter(f => f.status==='closed');
  return (
    <div className="main">
      <div className="card">
        <div className="card-title">⚠ Live Compliance Issues</div>
        <div className="stats-grid">
          {[
            { n:noPermit.length, label:'No Work Permit',   color:'#f59e0b' },
            { n:overdueL.length, label:'Overdue Locks',    color:'#ef4444' },
            { n:over24h.length,  label:'Locks > 24h',      color:'#f97316' },
            { n:seqViol.length,  label:'Seq. Violations',  color:'#a855f7' },
          ].map(s=>(
            <div key={s.label} className="stat-card">
              <div className="stat-num" style={{color:s.color}}>{s.n}</div>
              <div className="stat-label">{s.label}</div>
              <div className="stat-bar" style={{background:s.color}}/>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-title">🚩 Findings Summary</div>
        <div className="stats-grid">
          {[
            { n:fOpen.length,   label:'Open',            color:'#ef4444' },
            { n:fInPrg.length,  label:'In Progress',     color:'#f59e0b' },
            { n:fOvr.length,    label:'Past Due Date',   color:'#a855f7' },
            { n:fCrit.length,   label:'Critical Open',   color:'#dc2626' },
            { n:fClosed.length, label:'Closed Total',    color:'#22c55e' },
          ].map(s=>(
            <div key={s.label} className="stat-card">
              <div className="stat-num" style={{color:s.color}}>{s.n}</div>
              <div className="stat-label">{s.label}</div>
              <div className="stat-bar" style={{background:s.color}}/>
            </div>
          ))}
        </div>
      </div>
      {noPermit.length>0 && (
        <div className="card">
          <div className="card-title">📋 Locks Without Work Permit ({noPermit.length})</div>
          <div className="ovr-x"><table>
            <thead><tr><th>Lock No</th><th>Type</th><th>Equipment</th><th>Applied By</th><th>Applied At</th></tr></thead>
            <tbody>{noPermit.map(l=>{
              const eq=equipment.find(e=>e.id===l.equipment_id);
              return <tr key={l.id}>
                <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_no}</span></td>
                <td>{l.lock_type}</td><td>{eq?`${eq.tag} — ${eq.name}`:'—'}</td>
                <td>{l.applied_by}</td>
                <td style={{fontSize:11}}>{l.applied_at?new Date(l.applied_at).toLocaleString():'—'}</td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}
      {seqViol.length>0 && (
        <div className="card">
          <div className="card-title">⚡ Sequence Violations ({seqViol.length})</div>
          <div className="seq-alert">⚠ MECH/ELEC lock applied WITHOUT an Operations lock — safety violation</div>
          <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
            {seqViol.map(eq=>(
              <span key={eq.id} className="badge badge-red" style={{fontFamily:'monospace'}}>{eq.tag}</span>
            ))}
          </div>
        </div>
      )}
      {over24h.length>0 && (
        <div className="card">
          <div className="card-title">🕐 Locks Active More Than 24 Hours ({over24h.length})</div>
          <div className="ovr-x"><table>
            <thead><tr><th>Lock No</th><th>Equipment</th><th>Applied By</th><th>Duration</th><th>Reason</th></tr></thead>
            <tbody>{over24h.map(l=>{
              const eq=equipment.find(e=>e.id===l.equipment_id);
              const hrs=Math.floor((now-new Date(l.applied_at))/3600000);
              return <tr key={l.id}>
                <td><span className={`badge ${lockBadgeClass(l.lock_type)}`}>{l.lock_no}</span></td>
                <td>{eq?`${eq.tag} — ${eq.name}`:'—'}</td>
                <td>{l.applied_by}</td>
                <td><span className="badge badge-amber">{hrs}h</span></td>
                <td>{l.reason||'—'}</td>
              </tr>;
            })}</tbody>
          </table></div>
        </div>
      )}
    </div>
  );
}
