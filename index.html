    finding_type: finding?.finding_type || 'missing_lock',
    severity:     finding?.severity     || 'minor',
    eq_tag:       finding?.eq_tag       || '',
    eq_name:      finding?.eq_name      || '',
    description:  finding?.description  || '',
    assigned_to_role: finding?.assigned_to_role || 'ops_supervisor',
    assigned_to_name: finding?.assigned_to_name || '',
    due_date:     finding?.due_date     || '',
  });
  const [resNotes, setResNotes] = useState('');
  const [closeNotes, setCloseNotes] = useState('');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const fSet = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleCreate = async () => {
    if (!form.description.trim()) { setErr('Description is required.'); return; }
    setSaving(true);
    const { error } = await db.from('audit_findings').insert({
      ...form, status:'open',
      created_by: session.full_name, created_by_id: session.id_no,
      created_at: new Date().toISOString(),
    });
    if (error) { setErr(error.message); setSaving(false); return; }
    toast('Finding recorded'); onSaved();
  };

  const handleSupUpdate = async (newStatus) => {
    setSaving(true);
    const upd = { status: newStatus };
    if (newStatus==='in_progress') { upd.resolved_by=null; }
    if (newStatus==='resolved') {
      if (!resNotes.trim()) { setErr('Please add resolution notes.'); setSaving(false); return; }
      upd.resolved_by=session.full_name; upd.resolved_by_id=session.id_no;
      upd.resolved_at=new Date().toISOString(); upd.resolution_notes=resNotes;
    }
    const { error } = await db.from('audit_findings').update(upd).eq('id', finding.id);
    if (error) { setErr(error.message); setSaving(false); return; }
    toast(`Finding marked ${newStatus}`); onSaved();
  };

  const handleClose = async () => {
    setSaving(true);
    const { error } = await db.from('audit_findings').update({
      status:'closed', closed_by:session.full_name, closed_by_id:session.id_no,
      closed_at:new Date().toISOString(), closure_notes:closeNotes||null,
    }).eq('id', finding.id);
    if (error) { setErr(error.message); setSaving(false); return; }
    toast('Finding closed'); onSaved();
  };

  const sevCfg = finding ? SEV[finding.severity] : null;
  const stCfg  = finding ? FSTAT[finding.status]  : null;

  return (
    <Modal title={mode==='create'?'🚩 New Audit Finding':'🔍 Finding Detail'} onClose={onClose}
      footer={<>
        <button className="btn btn-ghost" onClick={onClose} disabled={saving}>Cancel</button>
        {mode==='create' && <button className="btn btn-danger" onClick={handleCreate} disabled={saving}>{saving?'Saving...':'Record Finding'}</button>}
        {mode==='detail' && isSup && finding?.status==='open' &&
          <button className="btn btn-warn" onClick={()=>handleSupUpdate('in_progress')} disabled={saving}>▶ Mark In Progress</button>}
        {mode==='detail' && isSup && finding?.status==='in_progress' &&
          <button className="btn btn-accent" onClick={()=>handleSupUpdate('resolved')} disabled={saving}>{saving?'Saving...':'✓ Mark Resolved'}</button>}
        {mode==='detail' && isAuditor && finding?.status==='resolved' &&
          <button className="btn btn-accent" onClick={handleClose} disabled={saving}>{saving?'Saving...':'🔒 Close Finding'}</button>}
      </>}>
      {err && <div className="alert alert-danger">{err}</div>}

      {mode==='create' && (<>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Finding Type</label>
            <select value={form.finding_type} onChange={e=>fSet('finding_type',e.target.value)} style={{width:'100%'}}>
              {FINDING_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Severity</label>
            <select value={form.severity} onChange={e=>fSet('severity',e.target.value)} style={{width:'100%'}}>
              {Object.entries(SEV).map(([v,c])=><option key={v} value={v}>{c.label}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Equipment Tag</label>
            <input type="text" value={form.eq_tag} onChange={e=>{
              fSet('eq_tag',e.target.value);
              const eq=equipment.find(eq=>eq.tag.toLowerCase()===e.target.value.toLowerCase());
              if(eq) fSet('eq_name',eq.name);
            }} placeholder="e.g. P-101A" style={{width:'100%'}} />
          </div>
          <div className="form-group">
            <label className="form-label">Equipment Name</label>
            <input type="text" value={form.eq_name} onChange={e=>fSet('eq_name',e.target.value)} style={{width:'100%'}} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Description <span style={{color:'var(--danger)'}}>*</span></label>
          <textarea value={form.description} onChange={e=>fSet('description',e.target.value)}
            rows={3} style={{width:'100%',resize:'vertical'}} placeholder="Describe what was found in the field..." />
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Assign To</label>
            <select value={form.assigned_to_role} onChange={e=>fSet('assigned_to_role',e.target.value)} style={{width:'100%'}}>
              {ASSIGNABLE.map(r=><option key={r.value} value={r.value}>{r.label}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Due Date</label>
            <input type="date" value={form.due_date} onChange={e=>fSet('due_date',e.target.value)} style={{width:'100%'}} />
          </div>
        </div>
      </>)}

      {mode==='detail' && finding && (<>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          <span className="badge" style={{background:sevCfg.bg,color:sevCfg.color,border:`1px solid ${sevCfg.border}`}}>{sevCfg.label}</span>
          <span style={{color:stCfg.color,fontWeight:700}}>{stCfg.icon} {stCfg.label}</span>
        </div>
        <div className="detail-panel" style={{marginBottom:12}}>
          <div className="detail-row"><span className="detail-label">Type</span><span>{FINDING_TYPES.find(t=>t.value===finding.finding_type)?.label||finding.finding_type}</span></div>
          {finding.eq_tag && <div className="detail-row"><span className="detail-label">Equipment</span><span className="eq-tag">{finding.eq_tag}{finding.eq_name&&` — ${finding.eq_name}`}</span></div>}
          <div className="detail-row"><span className="detail-label">Description</span><span style={{fontSize:12}}>{finding.description}</span></div>
          <div className="detail-row"><span className="detail-label">Assigned To</span><span>{ASSIGNABLE.find(r=>r.value===finding.assigned_to_role)?.label||finding.assigned_to_role}</span></div>
          {finding.due_date && <div className="detail-row"><span className="detail-label">Due Date</span><span style={{color:new Date(finding.due_date)<new Date()?'#ef4444':'inherit'}}>{finding.due_date}</span></div>}
          <div className="detail-row"><span className="detail-label">Recorded By</span><span>{finding.created_by} ({finding.created_by_id})</span></div>
          <div className="detail-row"><span className="detail-label">Recorded At</span><span style={{fontSize:11}}>{new Date(finding.created_at).toLocaleString()}</span></div>
        </div>
        {finding.resolution_notes && (
          <div className="detail-panel" style={{marginBottom:12}}>
            <div className="detail-row"><span className="detail-label">Resolved By</span><span>{finding.resolved_by}</span></div>
            <div className="detail-row"><span className="detail-label">Resolved At</span><span style={{fontSize:11}}>{new Date(finding.resolved_at).toLocaleString()}</span></div>
            <div className="detail-row"><span className="detail-label">Resolution</span><span style={{fontSize:12}}>{finding.resolution_notes}</span></div>
          </div>
        )}
        {finding.closure_notes && (
          <div className="detail-panel">
            <div className="detail-row"><span className="detail-label">Closed By</span><span>{finding.closed_by}</span></div>
            <div className="detail-row"><span className="detail-label">Closure Notes</span><span style={{fontSize:12}}>{finding.closure_notes}</span></div>
          </div>
        )}
        {isSup && finding.status==='in_progress' && (
          <div className="form-group" style={{marginTop:12}}>
            <label className="form-label">Resolution Notes <span style={{color:'var(--danger)'}}>*</span></label>
            <textarea value={resNotes} onChange={e=>setResNotes(e.target.value)} rows={3}
              style={{width:'100%',resize:'vertical'}} placeholder="Describe what corrective action was taken..." />
          </div>
        )}
        {isAuditor && finding.status==='resolved' && (
          <div className="form-group" style={{marginTop:12}}>
            <label className="form-label">Closure Notes (optional)</label>
            <textarea value={closeNotes} onChange={e=>setCloseNotes(e.target.value)} rows={2}
              style={{width:'100%',resize:'vertical'}} placeholder="Any final notes for closing..." />
          </div>
        )}
      </>)}
    </Modal>
  );
}

// ── FINDINGS BOARD ────────────────────────────────────────────────────────────
function FindingsBoard({ session, findings, equipment, onRefresh, showOnly }) {
  const perms = usePerms();
  const [statusFilter, setStatusFilter] = useState('all');
  const [sevFilter, setSevFilter] = useState('all');
  const [modal, setModal] = useState(null);
  const now = new Date();

  const displayed = findings.filter(f => {
    if (showOnly && f.assigned_to_role !== showOnly) return false;
    if (statusFilter !== 'all' && f.status !== statusFilter) return false;
    if (sevFilter !== 'all' && f.severity !== sevFilter) return false;
    return true;
  });

  return (
    <div className="main">
      <div className="card">
        <div className="section-header">
          <div className="card-title" style={{margin:0}}>
            {showOnly ? `Findings Assigned to You (${displayed.length})` : `All Findings (${displayed.length})`}
          </div>
          {canDo(perms, 'create_finding') && (
            <button className="btn btn-danger btn-sm" onClick={()=>setModal({mode:'create'})}>+ New Finding</button>
          )}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {['all','open','in_progress','resolved','closed'].map(s=>(
            <button key={s} className={`btn btn-sm ${statusFilter===s?'btn-accent':'btn-ghost'}`}
              onClick={()=>setStatusFilter(s)}>
              {s==='all'?'All':FSTAT[s]?.icon+' '+FSTAT[s]?.label}
            </button>
          ))}
          <select value={sevFilter} onChange={e=>setSevFilter(e.target.value)}
            style={{marginLeft:'auto',fontSize:12,padding:'4px 8px'}}>
            <option value="all">All Severities</option>
            {Object.entries(SEV).map(([v,c])=><option key={v} value={v}>{c.label}</option>)}
          </select>
        </div>
        {displayed.length===0 && <div className="empty">No findings match the current filters.</div>}
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {displayed.map(f=>{
            const sc = SEV[f.severity];
            const st = FSTAT[f.status];
            const isPastDue = f.due_date && f.status!=='closed' && new Date(f.due_date)<now;
            return (
              <div key={f.id} onClick={()=>setModal({mode:'detail',finding:f})}
                style={{background:'var(--s2)',border:`1px solid ${isPastDue?'rgba(239,68,68,.5)':sc.border}`,
                  borderRadius:10,padding:13,cursor:'pointer',transition:'border-color .2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=sc.color}
                onMouseLeave={e=>e.currentTarget.style.borderColor=isPastDue?'rgba(239,68,68,.5)':sc.border}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:5}}>
                      <span className="badge" style={{background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`}}>{sc.label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:st.color}}>{st.icon} {st.label}</span>
                      {isPastDue && <span className="badge badge-red">⏰ Past Due</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>
                      {FINDING_TYPES.find(t=>t.value===f.finding_type)?.label||f.finding_type}
                      {f.eq_tag && <span className="eq-tag" style={{marginLeft:8,fontSize:12}}>{f.eq_tag}</span>}
                    </div>
                    <div style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.description}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{ASSIGNABLE.find(r=>r.value===f.assigned_to_role)?.label||f.assigned_to_role}</div>
                    {f.due_date && <div style={{fontSize:10,color:isPastDue?'#ef4444':'var(--muted)'}}>Due: {f.due_date}</div>}
                    <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{new Date(f.created_at).toLocaleDateString()}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {modal?.mode==='create' && (
        <FindingModal mode="create" session={session} equipment={equipment}
          onClose={()=>setModal(null)} onSaved={()=>{setModal(null);onRefresh();}} />
      )}
      {modal?.mode==='detail' && (
        <FindingModal mode="detail" finding={modal.finding} session={session} equipment={equipment}
          onClose={()=>setModal(null)} onSaved={()=>{setModal(null);onRefresh();}} />
      )}
    </div>
  );
}

// ── DEPT SUPERINTENDENT APP (MECH / ELEC — VIEW ONLY) ────────────────────────
function DeptSuperintendentApp({ session, equipment, locks }) {
  const perms  = usePerms();
  const lockType  = roleLockType(session.role);
  const label     = lockType === 'mechanical' ? 'Mechanical' : 'Electrical';
  const boxSize   = '5×5';
  const allTabs = [
    { id:'box',     label:'📦 Box & Hooks',  feat:'box_hooks'  },
    { id:'locks',   label:'🔒 Active Locks', feat:'team_locks' },
    { id:'reports', label:'📋 Reports',      feat:'reports'    },
  ];
  const tabs = allTabs.filter(t => canSee(perms, t.feat));
  const [tab, setTab] = useState(tabs[0]?.id || 'box');
  const activeTab = tabs.find(t => t.id === tab) ? tab : tabs[0]?.id;
  const myLocks   = locks.filter(l => l.lock_type === lockType);
  const applied   = myLocks.filter(l => l.status === 'applied');
  const available = myLocks.filter(l => l.status === 'available');
  const violations = equipment.filter(eq => {
    const hasMine = locks.some(l => l.equipment_id === eq.id && l.lock_type === lockType && l.status === 'applied');
    const hasOps  = locks.some(l => l.equipment_id === eq.id && l.lock_type === 'operations' && l.status === 'applied');
    return hasMine && !hasOps;
  });
  return (
    <>
      <div className="tabs">
        {tabs.map(t => <button key={t.id} className={`tab ${activeTab===t.id?'on':''}`} onClick={() => setTab(t.id)}>{t.label}</button>)}
      </div>
      {activeTab === 'box' && (
        <div className="main">
          {violations.length > 0 && (
            <div className="seq-alert">
              ⚠ <strong>Sequence Violation:</strong> {violations.length} equipment has {label} lock but NO Operations lock — {violations.map(v=>v.tag).join(', ')}
            </div>
          )}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
            <div className="card">
              <div className="card-title">📦 {label} Box ({boxSize})</div>
              <BoxView lockType={lockType} locks={locks} equipment={equipment} />
            </div>
            <div className="card">
              <div className="card-title">🪝 {label} Hooks Board</div>
              <HooksView lockType={lockType} locks={locks} />
            </div>
          </div>
          <div className="card">
            <div className="stats-grid" style={{ gridTemplateColumns:'repeat(3,1fr)' }}>
              {[
                { num: myLocks.length,   label: 'Total Locks',     color: lockColor(lockType) },
                { num: applied.length,   label: 'Applied (in use)', color: '#ef4444' },
                { num: available.length, label: 'Available (hook)', color: '#22c55e' },
              ].map((s,i) => (
                <div key={i} className="stat-card">
                  <div className="stat-num" style={{ color: s.color }}>{s.num}</div>
                  <div className="stat-label">{s.label}</div>
                  <div className="stat-bar" style={{ background: s.color, opacity:.3 }} />
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {activeTab === 'locks' && (
        <div className="main">
          <div className="card">
            <div className="card-title">Applied {label} Locks ({applied.length})</div>
            {applied.length === 0 && <div className="empty">No {lockType} locks currently applied.</div>}
            <div className="ovr-x">
              <table>
                <thead><tr><th>Lock No</th><th>Equipment</th><th>Location</th><th>Applied By</th><th>Reason</th><th>Permit</th><th>Box Slot</th><th>Applied At</th></tr></thead>
                <tbody>
                  {applied.map(l => {
                    const eq = equipment.find(e => e.id === l.equipment_id);
                    return (
                      <tr key={l.id}>
                        <td style={{ fontFamily:'monospace', fontWeight:700, color:lockColor(lockType) }}>{l.lock_no}</td>
                        <td>{eq ? eq.tag : '—'}</td>
                        <td style={{ fontSize:11, color:'var(--muted)' }}>{eq ? `${eq.plant}→${eq.mcc_room}→${eq.rack}→${eq.row_position}` : '—'}</td>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [idNo, setIdNo] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      const { data, error } = await db.from('personnel').select('*').eq('id_no', idNo.trim()).eq('active', true).single();
      if (error || !data) { setErr('Employee not found or inactive.'); setLoading(false); return; }
      if (!data.password_hash || data.first_login) { onLogin({ ...data, _needSetPw: true }); return; }
      const hash = await sha256(pw);
      if (hash !== data.password_hash) { setErr('Incorrect password.'); setLoading(false); return; }
      await db.from('personnel').update({ last_login: new Date().toISOString() }).eq('id', data.id);
      const session = { id: data.id, full_name: data.full_name, id_no: data.id_no, role: data.role, company: data.company, shift: data.shift };
      localStorage.setItem('loto_session', JSON.stringify(session));
      onLogin(session);
    } catch (ex) { setErr('Error: ' + ex.message); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="login-icon">L</div>
          <div className="login-title">Smart LOTO</div>
          <div className="login-sub">Lockout/Tagout Management System</div>
        </div>
        {err && <div className="alert alert-danger">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">Employee I.D. No</label>
            <input type="text" value={idNo} onChange={e => setIdNo(e.target.value)} required placeholder="e.g. EMP-001" style={{ width: '100%' }} />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Enter password" style={{ width: '100%' }} />
          </div>
          <button className="btn btn-accent" type="submit" disabled={loading} style={{ width: '100%', marginTop: 8, padding: '10px' }}>
            {loading ? 'Signing in...' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── SET PASSWORD ──────────────────────────────────────────────────────────────
function SetPasswordScreen({ user, onDone }) {
  const [pw1, setPw1] = useState('');
  const [pw2, setPw2] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault(); setErr('');
    if (pw1.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    if (pw1 !== pw2)    { setErr('Passwords do not match.'); return; }
    setLoading(true);
    const hash = await sha256(pw1);
    const { error } = await db.from('personnel').update({ password_hash: hash, first_login: false, last_login: new Date().toISOString() }).eq('id', user.id);
    if (error) { setErr('Failed: ' + error.message); setLoading(false); return; }
    const session = { id: user.id, full_name: user.full_name, id_no: user.id_no, role: user.role, company: user.company, shift: user.shift };
    localStorage.setItem('loto_session', JSON.stringify(session));
    toast('Password set successfully!');
    onDone(session);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-brand">
          <div className="login-icon">L</div>
          <div className="login-title">Set Your Password</div>
          <div className="login-sub">Welcome, {user.full_name}. Please set a new password to continue.</div>
        </div>
        {err && <div className="alert alert-danger">{err}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">New Password (min 6 characters)</label>
            <input type="password" value={pw1} onChange={e => setPw1(e.target.value)} required style={{ width: '100%' }} />
          </div>
          <div className="form-group">
            <label className="form-label">Confirm Password</label>
            <input type="password" value={pw2} onChange={e => setPw2(e.target.value)} required style={{ width: '100%' }} />
          </div>
          <button className="btn btn-accent" type="submit" disabled={loading} style={{ width: '100%', marginTop: 8, padding: '10px' }}>
            {loading ? 'Saving...' : 'Set Password & Continue'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── ALERT BANNER ─────────────────────────────────────────────────────────────
const OVERDUE_ROLES = ['admin','hse','superintendent','auditor','mech_superintendent','elec_superintendent'];
const SUPERVISOR_ROLES = ['ops_supervisor','mech_supervisor','elec_supervisor'];

function AlertBanner({ session, locks, equipment, shiftConfig }) {
  const [dismissed, setDismissed] = useState({});
  const [extendId, setExtendId] = useState(null);
  const [extendHours, setExtendHours] = useState('2');
  const [statusModal, setStatusModal] = useState(null);
  const [statusChoice, setStatusChoice] = useState('');
  const [statusNote, setStatusNote] = useState('');
  const now = Date.now();
  const alerts = [];

  // Type 1 — expected time (30 min before, for the technician who applied)
  locks.filter(l => l.status === 'applied' && l.applied_id_no === session.id_no && l.expected_done_at).forEach(l => {
    const msLeft = new Date(l.expected_done_at) - now;
    if (msLeft <= 30 * 60000 && msLeft > -90 * 60000 && !dismissed[`exp_${l.id}`]) {
      const eq = equipment.find(e => e.id === l.equipment_id);
      alerts.push({ kind: 'expected', lock: l, eq, msLeft, key: `exp_${l.id}` });
    }
  });

  // Type 2 — overdue 24h (for senior roles)
  if (OVERDUE_ROLES.includes(session.role)) {
    locks.filter(l => l.status === 'applied' && l.applied_at).forEach(l => {
      const hrs = (now - new Date(l.applied_at)) / 3600000;
      if (hrs > 24 && !dismissed[`ov_${l.id}`]) {
        const eq = equipment.find(e => e.id === l.equipment_id);
        alerts.push({ kind: 'overdue', lock: l, eq, hrs, key: `ov_${l.id}` });
      }
    });
  }

  // Type 3 — shift end (30 min before, for supervisors)
  if (SUPERVISOR_ROLES.includes(session.role) && session.shift && shiftConfig.length > 0 && !dismissed['shift_end']) {
    const cfg = shiftConfig.find(s => s.shift_name === session.shift);
    if (cfg) {
      const [eh, em] = cfg.end_time.split(':').map(Number);
      const shiftEnd = new Date(); shiftEnd.setHours(eh, em, 0, 0);
      let msToEnd = shiftEnd - now;
      if (msToEnd < -12 * 3600000) msToEnd += 24 * 3600000;
      if (msToEnd <= 30 * 60000 && msToEnd > -30 * 60000) {
        const lt = roleLockType(session.role);
        const myActive = locks.filter(l => l.status === 'applied' && l.lock_type === lt);
        if (myActive.length > 0) alerts.push({ kind: 'shift_end', locks: myActive, msToEnd, key: 'shift_end' });
      }
    }
  }

  if (alerts.length === 0) return null;

  const dismiss = key => setDismissed(d => ({ ...d, [key]: true }));

  const handleExtend = async () => {
    const l = alerts.find(a => a.key === `exp_${extendId}`)?.lock;
    if (!l) return;
    const newDone = new Date(new Date(l.expected_done_at).getTime() + Number(extendHours) * 3600000).toISOString();
    await db.from('locks').update({ expected_done_at: newDone, expected_hours: (l.expected_hours || 0) + Number(extendHours) }).eq('id', l.id);
    setExtendId(null); dismiss(`exp_${l.id}`);
    toast(`Extended by ${extendHours}h`);
  };

  const handleStatus = async () => {
    if (!statusChoice) return;
    const l = statusModal;
    const note = statusChoice === 'other' ? statusNote : statusChoice === 'done' ? 'Work completed' : 'Work not completed';
    await db.from('audit_log').insert({ action: 'STATUS_UPDATE', lock_no: l.lock_no, lock_type: l.lock_type, by_name: session.full_name, by_id_no: session.id_no, reason: note, action_at: new Date().toISOString() });
    dismiss(`exp_${l.id}`); setStatusModal(null); setStatusChoice(''); setStatusNote('');
    toast('Status updated');
  };

  return (
    <div className="alert-banners-wrap">
      {alerts.map(a => {
        if (a.kind === 'expected') {
          const mins = Math.round(a.msLeft / 60000);
          return (
            <div key={a.key} className="alert-banner alert-banner-yellow">
              <span style={{ fontSize:20 }}>⏰</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:800, marginBottom:3 }}>
                  {mins > 0 ? `${mins} min until expected completion` : 'Expected completion time passed'}
                </div>
                <div style={{ fontSize:12 }}>Lock <strong>{a.lock.lock_no}</strong>{a.eq ? ` on ${a.eq.tag} — ${a.eq.name}` : ''}</div>
                <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                  <button className="btn btn-sm" style={{ background:'#22c55e', color:'#000' }} onClick={() => setStatusModal(a.lock)}>Update Status</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => setExtendId(a.lock.id)}>⏱ Extend Time</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => dismiss(a.key)}>Dismiss</button>
                </div>
                {extendId === a.lock.id && (
                  <div style={{ display:'flex', gap:6, marginTop:6, flexWrap:'wrap', alignItems:'center' }}>
                    <span style={{ fontSize:12 }}>Add:</span>
                    {['1','2','3','4'].map(h => (
                      <button key={h} className={`btn btn-sm ${extendHours === h ? 'btn-accent' : 'btn-ghost'}`} onClick={() => setExtendHours(h)}>{h}h</button>
                    ))}
                    <button className="btn btn-sm btn-accent" onClick={handleExtend}>Confirm</button>
                    <button className="btn btn-sm btn-ghost" onClick={() => setExtendId(null)}>Cancel</button>
                  </div>
                )}
              </div>
              <button onClick={() => dismiss(a.key)} style={{ background:'none', border:'none', color:'inherit', cursor:'pointer', fontSize:18, alignSelf:'flex-start' }}>×</button>
            </div>
          );
        }
        if (a.kind === 'overdue') {
          return (
            <div key={a.key} className="alert-banner alert-banner-red">
              <span style={{ fontSize:20 }}>🚨</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:800, marginBottom:3 }}>Lock overdue — {a.hrs.toFixed(0)}h applied</div>
                <div style={{ fontSize:12 }}>
                  Lock <strong>{a.lock.lock_no}</strong>{a.eq ? ` on ${a.eq.tag} — ${a.eq.name}` : ''} — Applied by {a.lock.applied_by}
                </div>
              </div>
              <button onClick={() => dismiss(a.key)} style={{ background:'none', border:'none', color:'inherit', cursor:'pointer', fontSize:18, alignSelf:'flex-start' }}>×</button>
            </div>
          );
        }
        if (a.kind === 'shift_end') {
          const mins = Math.round(a.msToEnd / 60000);
          return (
            <div key={a.key} className="alert-banner alert-banner-orange">
              <span style={{ fontSize:20 }}>🔔</span>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:800, marginBottom:3 }}>
                  Shift ending in {mins > 0 ? `${mins} min` : 'now'} — {a.locks.length} active lock{a.locks.length > 1 ? 's' : ''}
                </div>
                <div style={{ fontSize:12 }}>{a.locks.map(l => l.lock_no).join(', ')}</div>
              </div>
              <button onClick={() => dismiss(a.key)} style={{ background:'none', border:'none', color:'inherit', cursor:'pointer', fontSize:18, alignSelf:'flex-start' }}>×</button>
            </div>
          );
        }
        return null;
      })}
      {statusModal && (
        <div className="modal-overlay">
          <div className="modal" style={{ maxWidth:360 }}>
            <div className="modal-header"><div className="modal-title">🔔 Lock Status Update</div></div>
            <div className="modal-body">
              <div style={{ marginBottom:8, fontSize:13 }}>Lock <strong>{statusModal.lock_no}</strong> — What is the current status?</div>
              {[
                { val:'done',        label:'✅ Work completed — ready to remove lock' },
                { val:'not_done',    label:'❌ Work not completed — still in progress' },
                { val:'other',       label:'📝 Other reason' },
              ].map(opt => (
                <label key={opt.val} style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 0', cursor:'pointer', fontSize:13, borderBottom:'1px solid var(--b)' }}>
                  <input type="radio" name="status" value={opt.val} checked={statusChoice === opt.val} onChange={() => setStatusChoice(opt.val)} />
                  {opt.label}
                </label>
              ))}
              {statusChoice === 'other' && (
                <textarea value={statusNote} onChange={e => setStatusNote(e.target.value)}
                  placeholder="Describe the reason..." rows={3}
                  style={{ width:'100%', marginTop:8, resize:'vertical' }} />
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => { setStatusModal(null); setStatusChoice(''); }}>Cancel</button>
              <button className="btn btn-accent" onClick={handleStatus} disabled={!statusChoice || (statusChoice === 'other' && !statusNote.trim())}>Submit</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── SHIFT SETTINGS TAB (Admin) ────────────────────────────────────────────────
function ShiftSettingsTab() {
  const [config, setConfig] = useState([]);
  const [saving, setSaving] = useState(null);
  const [edited, setEdited] = useState({});
  useEffect(() => {
    db.from('shift_config').select('*').order('shift_name').then(({ data }) => {
      setConfig(data || []);
      const e = {};
      (data || []).forEach(s => { e[s.id] = { start_time: s.start_time, end_time: s.end_time }; });
      setEdited(e);
    });
  }, []);
  const save = async (id) => {
    setSaving(id);
    const { start_time, end_time } = edited[id];
    await db.from('shift_config').update({ start_time, end_time }).eq('id', id);
    setSaving(null); toast('Shift times saved');
  };
  return (
    <div className="main">
      <div className="card">
        <div className="card-title">⏰ Shift Schedule Settings</div>
        <table>
          <thead><tr><th>Shift Name</th><th>Start Time</th><th>End Time</th><th>Action</th></tr></thead>
          <tbody>
            {config.map(s => (
              <tr key={s.id}>
                <td style={{ fontWeight:700 }}>{s.shift_name}</td>
                <td>
                  <input type="time" value={edited[s.id]?.start_time || s.start_time}
                    onChange={e => setEdited(d => ({ ...d, [s.id]: { ...d[s.id], start_time: e.target.value } }))}
                    style={{ width:110 }} />
                </td>
                <td>
                  <input type="time" value={edited[s.id]?.end_time || s.end_time}
                    onChange={e => setEdited(d => ({ ...d, [s.id]: { ...d[s.id], end_time: e.target.value } }))}
                    style={{ width:110 }} />
                </td>
                <td>
                  <button className="btn btn-accent btn-sm" onClick={() => save(s.id)} disabled={saving === s.id}>
                    {saving === s.id ? 'Saving...' : 'Save'}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── PERMISSIONS TAB (ADMIN ONLY) ──────────────────────────────────────────────
function PermissionsTab() {
  const [selectedRole, setSelectedRole] = useState('hse');
  const [perms, setPerms] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [dirty, setDirty] = useState(false);

  useEffect(() => {
    setLoading(true); setDirty(false);
    db.from('role_permissions').select('permissions').eq('role', selectedRole).single()
      .then(({ data }) => { setPerms(data?.permissions || {}); setLoading(false); });
  }, [selectedRole]);

  const cycle = feat => {
    const levels = ['none', 'view', 'full'];
    const cur = perms[feat] || 'none';
    const next = levels[(levels.indexOf(cur) + 1) % 3];
    setPerms(p => ({ ...p, [feat]: next }));
    setDirty(true);
  };

  const save = async () => {
    setSaving(true);
    const { error } = await db.from('role_permissions').upsert({ role: selectedRole, permissions: perms });
    if (error) { toast('Save failed: ' + error.message, 'err'); }
    else { toast('Permissions saved for ' + PERM_ROLES.find(r => r.value === selectedRole)?.label); setDirty(false); }
    setSaving(false);
  };

  const lvlStyle = lvl => {
    if (lvl === 'full') return { background:'rgba(34,197,94,.15)', color:'#22c55e', border:'1px solid rgba(34,197,94,.3)' };
    if (lvl === 'view') return { background:'rgba(59,130,246,.15)', color:'#3b82f6', border:'1px solid rgba(59,130,246,.3)' };
    return { background:'rgba(100,116,139,.15)', color:'#94a3b8', border:'1px solid rgba(100,116,139,.3)' };
  };
  const lvlIcon = lvl => lvl === 'full' ? '✅ full' : lvl === 'view' ? '👁 view' : '❌ none';

  const FeatureRow = ({ f }) => {
    const lvl = perms[f.id] || 'none';
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'9px 12px', background:'var(--s2)', borderRadius:8, border:'1px solid var(--b)' }}>
        <span style={{ fontSize:13 }}>{f.icon} {f.label}</span>
        <button onClick={() => cycle(f.id)}
          style={{ ...lvlStyle(lvl), padding:'4px 12px', borderRadius:20, fontSize:12, fontWeight:700, cursor:'pointer', border:'1px solid', minWidth:90, textAlign:'center' }}>
          {lvlIcon(lvl)}
        </button>
      </div>
    );
  };

  return (
    <div className="main">
      <div className="card">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12, marginBottom:20 }}>
          <div className="card-title" style={{ margin:0 }}>🔑 Role Permissions</div>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <select value={selectedRole} onChange={e => setSelectedRole(e.target.value)} style={{ minWidth:180 }}>
              {PERM_ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
            </select>
            <button className="btn btn-accent" onClick={save} disabled={saving || loading || !dirty}>
              {saving ? 'Saving…' : 'Save'}
            </button>
          </div>
        </div>
        {dirty && <div className="alert alert-warn" style={{ marginBottom:14 }}>⚠ Unsaved changes — click Save to apply.</div>}
        {loading ? <div style={{ display:'flex', justifyContent:'center', padding:30 }}><div className="spin" /></div> : (
          <>
            <div style={{ marginBottom:6, fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Tab Visibility</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:8, marginBottom:20 }}>
              {PERM_FEATURES.tabs.map(f => <FeatureRow key={f.id} f={f} />)}
            </div>
            <div style={{ marginBottom:6, fontSize:11, fontWeight:700, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Actions</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:8 }}>
              {PERM_FEATURES.actions.map(f => <FeatureRow key={f.id} f={f} />)}
            </div>
            <div style={{ marginTop:14, fontSize:11, color:'var(--muted)' }}>
              ❌ none = feature hidden · 👁 view = read-only / visible · ✅ full = full access + actions
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession]         = useState(null);
  const [pendingUser, setPendingUser]  = useState(null);
  const [equipment, setEquipment]     = useState([]);
  const [locks, setLocks]             = useState([]);
  const [shiftConfig, setShiftConfig] = useState([]);
  const [loading, setLoading]         = useState(true);
  const [perms, setPerms]             = useState(null); // null = not yet loaded
  const timerRef = useRef(null);

  useEffect(() => {
    const stored = localStorage.getItem('loto_session');
    if (stored) { try { setSession(JSON.parse(stored)); } catch (e) {} }
    setLoading(false);
  }, []);

  const fetchData = useCallback(async () => {
    const [eqRes, lockRes] = await Promise.all([
      db.from('equipment').select('*').order('tag'),
      db.from('locks').select('*').order('lock_no'),
    ]);
    setEquipment(eqRes.data || []);
    setLocks(lockRes.data || []);
  }, []);

  useEffect(() => {
    if (!session) return;
    fetchData();
    db.from('shift_config').select('*').then(({ data }) => setShiftConfig(data || []));
    timerRef.current = setInterval(fetchData, 30000);
    // Load permissions — admin gets full access sentinel, others load from DB
    if (session.role === 'admin') {
      setPerms({ _admin: true });
    } else {
      db.from('role_permissions').select('permissions').eq('role', session.role).single()
        .then(({ data }) => setPerms(data?.permissions || {}));
    }
    return () => clearInterval(timerRef.current);
  }, [session, fetchData]);

  const handleLogin = user => {
    if (user._needSetPw) { setPendingUser(user); return; }
    setSession(user);
  };

  const handleSetPwDone = sess => { setPendingUser(null); setSession(sess); };

  const handleLogout = () => {
    localStorage.removeItem('loto_session');
    setSession(null); setEquipment([]); setLocks([]); setPerms(null);
  };

  if (loading) return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}><div className="spin" /></div>;
  if (pendingUser) return <><SetPasswordScreen user={pendingUser} onDone={handleSetPwDone} /><Toasts /></>;
  if (!session)    return <><LoginScreen onLogin={handleLogin} /><Toasts /></>;

  // Show spinner while permissions are being loaded for non-admin roles
  const permsReady = perms !== null;

  return (
    <PermsCtx.Provider value={perms || {}}>
      <nav>
        <div className="brand">
          <div className="brand-icon">L</div>
          <div>
            <div className="brand-text">Smart LOTO</div>
            <div className="brand-sub">Lockout/Tagout System</div>
          </div>
        </div>
        <div className="live-pill">
          <div className="live-dot" />
          <span>LIVE</span>
        </div>
        <div className="nav-right">
          <div className="user-pill">
            <span style={{ fontWeight: 700 }}>{session.full_name}</span>
            <span className={`role-badge role-${session.role}`}>{roleDisplay(session.role)}</span>
            {session.shift && <span style={{ fontSize: 10, color: 'var(--muted)' }}>Shift: {session.shift}</span>}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={handleLogout}>Sign Out</button>
        </div>
      </nav>
      <AlertBanner session={session} locks={locks} equipment={equipment} shiftConfig={shiftConfig} />
      {!permsReady && <div style={{ display:'flex', justifyContent:'center', padding:40 }}><div className="spin" /></div>}
      {permsReady && session.role === 'admin'               && <SupervisorApp        session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {permsReady && session.role === 'auditor'             && <AuditorApp           session={session} equipment={equipment} locks={locks} />}
      {permsReady && isViewOnly(session.role)               && <ReadOnlyApp          session={session} equipment={equipment} locks={locks} />}
      {permsReady && isDeptSuperintendent(session.role)     && <DeptSuperintendentApp session={session} equipment={equipment} locks={locks} />}
      {permsReady && session.role === 'ops_supervisor'      && <OpsSupervisorApp     session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {permsReady && session.role === 'operations'          && <OperationsApp        session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {permsReady && (session.role === 'mech_supervisor' || session.role === 'mechanical') && <MechElecApp session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {permsReady && (session.role === 'elec_supervisor' || session.role === 'electrical') && <MechElecApp session={session} equipment={equipment} locks={locks} onRefresh={fetchData} />}
      {permsReady && !['admin','hse','superintendent','auditor','ops_supervisor','operations','mech_superintendent','mech_supervisor','mechanical','elec_superintendent','elec_supervisor','electrical'].includes(session.role) && (
        <div className="main"><div className="alert alert-danger">Unknown role "{session.role}". Please sign out and log in again.</div></div>
      )}
      <Toasts />
    </PermsCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
